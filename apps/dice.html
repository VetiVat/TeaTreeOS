<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seed Lottery</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/cursors.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--cream);
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    .header {
      text-align: center;
      color: var(--bark);
      margin-bottom: 8px;
    }

    .header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .header p {
      font-size: 0.8rem;
      color: var(--soil);
      margin-top: 2px;
    }

    .seed-types {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 8px;
    }

    .seed-btn {
      padding: 10px;
      background: var(--fog);
      border: 2px solid var(--lichen);
      border-radius: var(--radius-md);
      color: var(--text-dark);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all var(--transition-fast);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .seed-btn:hover {
      background: var(--mist);
      transform: translateY(-2px);
    }

    .seed-btn.selected {
      background: var(--moss);
      color: var(--text-light);
      border-color: var(--fern);
      box-shadow: 0 2px 8px rgba(74, 124, 89, 0.3);
    }

    .seed-icon {
      font-size: 1.5rem;
    }

    .seed-label {
      font-size: 0.75rem;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .quantity-control {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .quantity-control label {
      font-size: 0.8rem;
      color: var(--bark);
      font-weight: 500;
    }

    .quantity-control input {
      width: 60px;
      padding: 8px;
      background: var(--fog);
      border: 1px solid var(--lichen);
      border-radius: var(--radius-sm);
      color: var(--text-dark);
      font-size: 0.9rem;
    }

    .button-group {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    .grow-btn {
      flex: 1;
      padding: 10px 16px;
      background: var(--moss);
      color: var(--text-light);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all var(--transition-fast);
    }

    .grow-btn:hover {
      background: var(--fern);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(74, 124, 89, 0.3);
    }

    .grow-btn:active {
      transform: translateY(0);
    }

    .reset-btn {
      padding: 10px 16px;
      background: var(--soil);
      color: var(--text-light);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all var(--transition-fast);
    }

    .reset-btn:hover {
      background: var(--bark);
    }

    .results {
      flex: 1;
      overflow-y: auto;
      background: white;
      border: 1px solid var(--lichen);
      border-radius: var(--radius-md);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .harvest {
      padding: 12px;
      background: var(--fog);
      border-left: 4px solid var(--moss);
      border-radius: var(--radius-sm);
      animation: grow-in 0.4s ease-out;
    }

    @keyframes grow-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .harvest-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--bark);
    }

    .harvest-time {
      font-size: 0.75rem;
      color: var(--soil);
    }

    .harvest-seeds {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .seed-result {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 8px;
      background: var(--cream);
      border: 1px solid var(--lichen);
      border-radius: var(--radius-sm);
      color: var(--text-dark);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .harvest-total {
      padding-top: 8px;
      border-top: 1px solid var(--lichen);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--moss);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--soil);
      text-align: center;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 8px;
      opacity: 0.6;
    }

    .empty-text {
      font-style: italic;
    }

    .harvest-count {
      font-size: 0.75rem;
      color: var(--soil);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌱 Seed Lottery</h1>
    <p>Plant your fortune with nature's chance</p>
  </div>

  <div class="seed-types" id="seedTypes"></div>

  <div class="controls">
    <div class="quantity-control">
      <label for="quantity">How many:</label>
      <input type="number" id="quantity" min="1" max="50" value="1">
    </div>
    <div class="button-group">
      <button class="grow-btn" id="growBtn" type="button">Grow Seeds</button>
      <button class="reset-btn" id="resetBtn" type="button">Clear</button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="empty-state">
      <div class="empty-icon">🌾</div>
      <div class="empty-text">Select a seed type and plant your fortune...</div>
    </div>
  </div>

  <script>
    // Seeds configuration with nature-themed names
    const SEEDS = {
      acorn: { name: 'Acorn', icon: '🌰', max: 20 },
      cherry: { name: 'Cherry', icon: '🍒', max: 30 },
      apple: { name: 'Apple', icon: '🍎', max: 25 },
      berry: { name: 'Berry', icon: '🫐', max: 35 },
      mushroom: { name: 'Mushroom', icon: '🍄', max: 15 },
      leaf: { name: 'Leaf', icon: '🍃', max: 50 },
    };

    // DOM elements
    const seedTypesContainer = document.getElementById('seedTypes');
    const quantityInput = document.getElementById('quantity');
    const growBtn = document.getElementById('growBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resultsContainer = document.getElementById('results');

    // State
    let selectedSeed = 'acorn';
    let harvests = [];

    // Initialize seed buttons
    function initializeSeeds() {
      Object.entries(SEEDS).forEach(([key, seed]) => {
        const btn = document.createElement('button');
        btn.className = 'seed-btn';
        if (key === 'acorn') btn.classList.add('selected');
        btn.innerHTML = `
          <span class="seed-icon">${seed.icon}</span>
          <span class="seed-label">d${seed.max}</span>
        `;
        btn.onclick = () => selectSeed(key, btn);
        seedTypesContainer.appendChild(btn);
      });
    }

    // Select a seed type
    function selectSeed(seedKey, btnElement) {
      selectedSeed = seedKey;
      
      // Update UI
      document.querySelectorAll('.seed-btn').forEach(btn => {
        btn.classList.remove('selected');
      });
      btnElement.classList.add('selected');
    }

    // Grow seeds (roll dice)
    function growSeeds() {
      const quantity = parseInt(quantityInput.value) || 1;
      
      if (quantity < 1 || quantity > 50) {
        quantityInput.value = Math.max(1, Math.min(quantity, 50));
        return;
      }

      const seed = SEEDS[selectedSeed];
      const results = [];

      for (let i = 0; i < quantity; i++) {
        results.push(Math.floor(Math.random() * seed.max) + 1);
      }

      const total = results.reduce((a, b) => a + b, 0);
      
      const harvest = {
        seedType: selectedSeed,
        seedName: seed.name,
        seedIcon: seed.icon,
        quantity: quantity,
        results: results,
        total: total,
        timestamp: new Date().toLocaleTimeString(),
      };

      harvests.unshift(harvest);
      if (harvests.length > 50) harvests.pop();

      renderHarvests();
    }

    // Render harvest results
    function renderHarvests() {
      if (harvests.length === 0) {
        resultsContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🌾</div>
            <div class="empty-text">Select a seed type and plant your fortune...</div>
          </div>
        `;
        return;
      }

      resultsContainer.innerHTML = harvests.map(harvest => `
        <div class="harvest">
          <div class="harvest-header">
            <span>${harvest.seedIcon} ${harvest.quantity}× ${harvest.seedName}</span>
            <span class="harvest-time">${harvest.timestamp}</span>
          </div>
          <div class="harvest-seeds">
            ${harvest.results.map(val => `<span class="seed-result">${val}</span>`).join('')}
          </div>
          <div class="harvest-total">🌱 Total growth: ${harvest.total}</div>
          <div class="harvest-count">${harvest.results.length} seed${harvest.results.length !== 1 ? 's' : ''} sprouted</div>
        </div>
      `).join('');
    }

    // Reset the app
    function resetApp() {
      if (confirm('Clear all harvests and reset the garden?')) {
        // Clear all harvests
        harvests = [];
        
        // Reset UI
        quantityInput.value = '1';
        
        // Re-render empty state
        renderHarvests();
      }
    }

    // Clear localStorage when page unloads
    window.addEventListener('beforeunload', () => {
      harvests = [];
    });

    // Event listeners
    growBtn.addEventListener('click', growSeeds);
    resetBtn.addEventListener('click', resetApp);

    quantityInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') growSeeds();
    });

    // Keyboard shortcuts for seed selection
    document.addEventListener('keydown', (e) => {
      const keyMap = {
        '1': 'acorn',
        '2': 'cherry',
        '3': 'apple',
        '4': 'berry',
        '5': 'mushroom',
        '6': 'leaf',
      };
      
      if (keyMap[e.key]) {
        const seedKey = keyMap[e.key];
        selectedSeed = seedKey;
        
        // Update UI
        document.querySelectorAll('.seed-btn').forEach((btn, index) => {
          const key = Object.keys(SEEDS)[index];
          btn.classList.toggle('selected', key === seedKey);
        });
      }
    });

    // Initialize
    initializeSeeds();
    renderHarvests();
  </script>
</body>
</html>
