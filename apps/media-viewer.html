<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Viewer</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-ui);
      background: var(--cream);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .media-viewer {
      max-width: 100%;
      max-height: 100%;
    }
    video, audio {
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="media-viewer"></div>

  <script type="module">
    import { readFileAsDataURL } from '../js/filesystem-manager.js';

    const mediaViewer = document.querySelector('.media-viewer');

    window.addEventListener('message', async (event) => {
      if (event.data.type === 'teatreeos-media-data') {
        const { fileHandle, mimeType } = event.data;
        try {
          const dataUrl = await readFileAsDataURL(fileHandle);
          let content;
          if (mimeType.startsWith('image')) {
            content = `<img src="${dataUrl}" alt="Media">`;
          } else if (mimeType.startsWith('video')) {
            content = `<video controls><source src="${dataUrl}" type="${mimeType}"></video>`;
          } else if (mimeType.startsWith('audio')) {
            content = `<audio controls><source src="${dataUrl}" type="${mimeType}"></audio>`;
          }
          mediaViewer.innerHTML = content;
        } catch (err) {
          console.error('Error reading file:', err);
        }
      }
    });
  </script>
</body>
</html>
