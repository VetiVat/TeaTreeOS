<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vine Slither</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--peat);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 380px;
      color: var(--lichen);
      font-size: 0.85rem;
    }

    .hud strong { color: var(--fern); }

    canvas {
      border: 2px solid var(--moss);
      border-radius: var(--radius-sm);
      background: #1a2e24;
      max-width: 100%;
    }

    .hint {
      color: var(--lichen);
      font-size: 0.75rem;
      text-align: center;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(26, 46, 36, 0.85);
      color: var(--text-light);
    }

    .overlay.visible { display: flex; }

    .overlay button {
      padding: 8px 20px;
      background: var(--moss);
      color: var(--text-light);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .overlay button:hover { background: var(--fern); }

    .canvas-wrap {
      position: relative;
    }
  </style>
</head>
<body>
  <div class="hud">
    <span>Score: <strong id="score">0</strong></span>
    <span>High: <strong id="high">0</strong></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="game" width="380" height="380"></canvas>
    <div class="overlay" id="overlay">
      <p id="overlay-msg">Game Over</p>
      <button type="button" id="restart">Grow again</button>
    </div>
  </div>
  <p class="hint">Arrow keys to slither · Space to pause</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highEl = document.getElementById('high');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlay-msg');
    const restartBtn = document.getElementById('restart');

    const GRID = 19;
    const CELL = canvas.width / GRID;
    const HIGH_KEY = 'teatreeos-snake-high';

    let snake, direction, nextDirection, berry, score, high, loop, paused, gameOver;

    high = parseInt(localStorage.getItem(HIGH_KEY) || '0', 10);
    highEl.textContent = high;

    function init() {
      snake = [
        { x: 9, y: 9 },
        { x: 8, y: 9 },
        { x: 7, y: 9 },
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      paused = false;
      gameOver = false;
      scoreEl.textContent = '0';
      overlay.classList.remove('visible');
      placeBerry();
    }

    function placeBerry() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID),
        };
      } while (snake.some((s) => s.x === pos.x && s.y === pos.y));
      berry = pos;
    }

    function tick() {
      if (paused || gameOver) return;

      direction = { ...nextDirection };
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y,
      };

      if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
          snake.some((s) => s.x === head.x && s.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === berry.x && head.y === berry.y) {
        score++;
        scoreEl.textContent = score;
        if (score > high) {
          high = score;
          highEl.textContent = high;
          localStorage.setItem(HIGH_KEY, String(high));
        }
        placeBerry();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = '#1a2e24';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#8b4a5e';
      ctx.beginPath();
      ctx.arc(
        berry.x * CELL + CELL / 2,
        berry.y * CELL + CELL / 2,
        CELL / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();

      snake.forEach((seg, i) => {
        ctx.fillStyle = i === 0 ? '#7ba05b' : '#4a7c59';
        ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
      });
    }

    function endGame() {
      gameOver = true;
      overlayMsg.textContent = `Game Over — Score: ${score}`;
      overlay.classList.add('visible');
    }

    function startLoop() {
      clearInterval(loop);
      loop = setInterval(tick, 120);
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key;
      if (key === ' ') {
        e.preventDefault();
        if (!gameOver) paused = !paused;
        return;
      }
      const map = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
      };
      const dir = map[key];
      if (!dir) return;
      e.preventDefault();
      if (dir.x === -direction.x && dir.y === -direction.y) return;
      nextDirection = dir;
    });

    restartBtn.addEventListener('click', () => {
      init();
      draw();
    });

    init();
    draw();
    startLoop();
  </script>
</body>
</html>
