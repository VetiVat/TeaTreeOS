<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canopy Settings</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/cursors.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--cream);
      height: 100vh;
      overflow-y: auto;
      padding: 16px;
      color: var(--text-dark);
    }

    h1 {
      font-size: 1.1rem;
      color: var(--bark);
      margin-bottom: 16px;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--lichen);
      margin-bottom: 16px;
    }

    .tab-btn {
      padding: 10px 16px;
      background: transparent;
      border: none;
      color: var(--soil);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 3px solid transparent;
      transition: all var(--transition-fast);
      margin-bottom: -2px;
    }

    .tab-btn:hover {
      color: var(--bark);
    }

    .tab-btn.active {
      color: var(--moss);
      border-bottom-color: var(--moss);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    section {
      margin-bottom: 20px;
    }

    section h2 {
      font-size: 0.85rem;
      color: var(--soil);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .wallpapers {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .wallpaper-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .wallpaper-option input {
      display: none;
    }

    .wallpaper-swatch {
      width: 72px;
      height: 48px;
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      transition: border-color var(--transition-fast);
    }

    .wallpaper-option input:checked + .wallpaper-swatch {
      border-color: var(--moss);
      box-shadow: 0 0 0 2px rgba(74, 124, 89, 0.3);
    }

    .swatch-mist {
      background: linear-gradient(180deg, #e8ebe4, #dde3d8);
    }

    .swatch-forest {
      background: linear-gradient(180deg, #c8d4c0, #a8b89a);
    }

    .swatch-bark {
      background: linear-gradient(180deg, #e0d6c8, #c4b4a0);
    }

    .wallpaper-option span {
      font-size: 0.75rem;
      color: var(--bark);
    }

    .about {
      padding: 12px;
      background: var(--fog);
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-dark);
    }

    .about strong {
      color: var(--moss);
    }
  </style>
</head>
<body>
  <h1>🌳 Canopy Settings</h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="appearance" type="button">Appearance</button>
    <button class="tab-btn" data-tab="about" type="button">About</button>
  </div>

  <!-- Appearance Tab -->
  <div class="tab-content active" id="appearance-tab">
    <section>
      <h2>Desktop Grove</h2>
      <div class="wallpapers">
        <label class="wallpaper-option">
          <input type="radio" name="wallpaper" value="mist">
          <div class="wallpaper-swatch swatch-mist"></div>
          <span>Morning Mist</span>
        </label>
        <label class="wallpaper-option">
          <input type="radio" name="wallpaper" value="forest">
          <div class="wallpaper-swatch swatch-forest"></div>
          <span>Deep Forest</span>
        </label>
        <label class="wallpaper-option">
          <input type="radio" name="wallpaper" value="bark">
          <div class="wallpaper-swatch swatch-bark"></div>
          <span>Weathered Bark</span>
        </label>
      </div>
    </section>
  </div>

  <!-- About Tab -->
  <div class="tab-content" id="about-tab">
    <section>
      <h2>About</h2>
      <div class="about">
        <p><strong>TeaTreeOS</strong> is a nature-inspired desktop environment that grows inside your browser.</p>
        <p style="margin-top:8px">Plant new apps by adding files to the <code>apps/</code> folder and registering them in <code>app-registry.js</code>.</p>
      </div>
    </section>
  </div>

  <script type="module">
    const tabButtons = document.querySelectorAll('.tab-btn');
    const radios = document.querySelectorAll('input[name="wallpaper"]');

    // Tab switching
    tabButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach((c) => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`${tabName}-tab`).classList.add('active');
      });
    });

    // Wallpaper selection
    function applyWallpaper(value) {
      window.parent.postMessage({ type: 'teatreeos-settings', wallpaper: value }, '*');
    }

    radios.forEach((radio) => {
      radio.addEventListener('change', () => {
        if (radio.checked) applyWallpaper(radio.value);
      });
    });

    window.addEventListener('message', (event) => {
      if (event.data?.type === 'teatreeos-settings-state') {
        const radio = document.querySelector(`input[value="${event.data.wallpaper}"]`);
        if (radio) radio.checked = true;
      }
    });

    window.parent.postMessage({ type: 'teatreeos-get-settings' }, '*');
  </script>
</body>
</html>
