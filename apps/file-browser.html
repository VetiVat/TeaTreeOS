<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Grove</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/cursors.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--cream);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: var(--text-dark);
    }

    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--fog);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--fog);
    }

    header h1 {
      font-size: 0.9rem;
      color: var(--bark);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .path-display {
      font-size: 0.75rem;
      color: var(--soil);
      background: var(--cream);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--fog);
      max-width: 60%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .file-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition-fast), transform 0.1s;
      text-align: center;
      user-select: none;
    }

    .file-item:hover {
      background: var(--fog);
    }

    .file-item:active {
      transform: scale(0.98);
    }

    .file-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      line-height: 1;
    }

    .file-name {
      font-size: 0.75rem;
      color: var(--bark);
      word-break: break-word;
      line-height: 1.2;
    }

    .folder-icon { color: var(--soil); }
    .file-icon-default { color: var(--moss); }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 0;
      color: var(--soil);
      font-size: 0.9rem;
      font-style: italic;
    }

    /* Loading State */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 20px;
      color: var(--soil);
    }

    /* Scrollbar styling */
    .file-container::-webkit-scrollbar {
      width: 8px;
    }
    .file-container::-webkit-scrollbar-track {
      background: var(--cream);
    }
    .file-container::-webkit-scrollbar-thumb {
      background: var(--fog);
      border-radius: 4px;
    }
    .file-container::-webkit-scrollbar-thumb:hover {
      background: var(--soil);
    }
  </style>
</head>
<body>
  <header>
    <h1>📂 File Grove</h1>
    <div class="path-display" id="path-display">No Mount</div>
  </header>

  <div class="file-container" id="file-list">
    <div class="loading-state">Waiting for folder mount...</div>
  </div>

  <script>
    const fileList    = document.getElementById('file-list');
    const pathDisplay = document.getElementById('path-display');

    // ─── State ────────────────────────────────────────────────────────────────
    let rootHandle      = null;              // handle of the mounted root folder
    let currentDirHandle = null;             // handle of the currently displayed folder
    let currentPathParts = [];               // breadcrumb segments below root

    /**
     * History stack for back-navigation.
     * Each entry: { handle: FileSystemDirectoryHandle, pathParts: string[] }
     */
    const navHistory = [];

    // ─── Icon helper ──────────────────────────────────────────────────────────
    function getIcon(name, kind) {
      if (kind === 'directory') return '📁';
      const ext = name.split('.').pop().toLowerCase();
      return { js:'📜', ts:'📜', html:'📄', htm:'📄', css:'🎨',
               png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', svg:'🖼️',
               json:'📋', txt:'📝', md:'📝' }[ext] ?? '📃';
    }

    // ─── Mount a new root ─────────────────────────────────────────────────────
    function mountRoot(handle) {
      rootHandle       = handle;
      currentDirHandle = handle;
      currentPathParts = [];
      navHistory.length = 0;
      pathDisplay.textContent = `/ ${handle.name}`;
      renderFilesFromHandle(handle);
    }

    // ─── Unmount ──────────────────────────────────────────────────────────────
    function unmountRoot() {
      rootHandle        = null;
      currentDirHandle  = null;
      currentPathParts  = [];
      navHistory.length = 0;
      pathDisplay.textContent = 'No Mount';
      fileList.innerHTML = '<div class="empty-state">No folder mounted.</div>';
    }

    // ─── Render directory contents ────────────────────────────────────────────
    async function renderFilesFromHandle(dirHandle) {
      fileList.innerHTML = '<div class="loading-state">Loading...</div>';

      try {
        const items = [];
        for await (const [name, handle] of dirHandle.entries()) {
          items.push({ name, kind: handle.kind, handle });
        }

        items.sort((a, b) => {
          if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
          return a.name.localeCompare(b.name);
        });

        fileList.innerHTML = '';

        if (items.length === 0) {
          fileList.innerHTML = '<div class="empty-state">This grove is empty.</div>';
          return;
        }

        for (const item of items) {
          const div  = document.createElement('div');
          div.className = 'file-item';

          const iconEl  = document.createElement('div');
          iconEl.className = 'file-icon ' + (item.kind === 'directory' ? 'folder-icon' : 'file-icon-default');
          iconEl.textContent = getIcon(item.name, item.kind);

          const nameEl = document.createElement('div');
          nameEl.className = 'file-name';
          nameEl.textContent = item.name;

          div.appendChild(iconEl);
          div.appendChild(nameEl);

          div.addEventListener('click', () => {
            if (item.kind === 'directory') {
              navigateInto(item.handle, item.name);
            } else {
              const path = '/' + [...currentPathParts, item.name].join('/');
              window.parent.postMessage({
                type: 'teatreeos-file-selected',
                path,
                name: item.name,
                handle: item.handle,
              }, '*');
            }
          });

          fileList.appendChild(div);
        }
      } catch (err) {
        console.error('Error listing directory:', err);
        fileList.innerHTML = '<div class="empty-state">Error loading files. Permissions may be denied.</div>';
      }
    }

    // ─── Navigate into a sub-directory ────────────────────────────────────────
    function navigateInto(newDirHandle, name) {
      // Push current location onto the history stack before moving
      navHistory.push({ handle: currentDirHandle, pathParts: [...currentPathParts] });

      currentDirHandle = newDirHandle;
      currentPathParts.push(name);
      pathDisplay.textContent = '/ ' + currentPathParts.join(' / ');
      renderFilesFromHandle(newDirHandle);
    }

    // ─── Navigate back (one level up) ─────────────────────────────────────────
    function navigateBack() {
      if (navHistory.length === 0) return;

      const prev = navHistory.pop();
      currentDirHandle = prev.handle;
      currentPathParts = prev.pathParts;
      pathDisplay.textContent = currentPathParts.length === 0
        ? `/ ${rootHandle?.name ?? ''}`
        : '/ ' + currentPathParts.join(' / ');
      renderFilesFromHandle(currentDirHandle);
    }

    // ─── Back on header click ─────────────────────────────────────────────────
    document.querySelector('header h1').addEventListener('click', navigateBack);

    // ─── Listen for postMessage from parent (direct iframe use) ───────────────
    window.addEventListener('message', (event) => {
      const { type, handle, name } = event.data ?? {};

      if (type === 'teatreeos-mount-folder' && handle?.kind === 'directory') {
        mountRoot(handle);
      }
      if (type === 'teatreeos-unmount-folder') {
        unmountRoot();
      }
    });

    // ─── Listen for BroadcastChannel events (same-origin, any context) ────────
    // This fires automatically whenever filesystem-manager.js calls mountFolder()
    // or removeMountedFolder(), with no parent-page wiring required.
    const fsChannel = new BroadcastChannel('teatreeos-fs');
    fsChannel.addEventListener('message', (event) => {
      const { type, handle, name } = event.data ?? {};

      if (type === 'teatreeos-mount-folder' && handle?.kind === 'directory') {
        mountRoot(handle);
      }
      if (type === 'teatreeos-unmount-folder') {
        unmountRoot();
      }
    });
  </script>
</body>
</html>
