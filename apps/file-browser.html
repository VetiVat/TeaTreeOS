<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Grove</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/cursors.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--cream);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: var(--text-dark);
    }

    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--fog);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--fog);
    }

    header h1 {
      font-size: 0.9rem;
      color: var(--bark);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .path-display {
      font-size: 0.75rem;
      color: var(--soil);
      background: var(--cream);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--fog);
      max-width: 60%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .mount-btn {
        background: var(--moss);
        color: var(--cream);
        border: none;
        padding: 6px 12px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 0.8rem;
        font-family: var(--font-ui);
        transition: background 0.2s;
    }

    .mount-btn:hover {
        background: var(--bark);
    }

    .mount-btn:disabled {
        background: var(--fog);
        color: var(--soil);
        cursor: not-allowed;
    }

    .file-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .file-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition-fast), transform 0.1s;
      text-align: center;
      user-select: none;
    }

    .file-item:hover {
      background: var(--fog);
    }

    .file-item:active {
      transform: scale(0.98);
    }

    .file-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      line-height: 1;
    }

    .file-name {
      font-size: 0.75rem;
      color: var(--bark);
      word-break: break-word;
      line-height: 1.2;
    }

    .folder-icon { color: var(--soil); }
    .file-icon-default { color: var(--moss); }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 0;
      color: var(--soil);
      font-size: 0.9rem;
      font-style: italic;
    }

    /* Loading State */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 20px;
      color: var(--soil);
    }

    /* Scrollbar styling */
    .file-container::-webkit-scrollbar {
      width: 8px;
    }
    .file-container::-webkit-scrollbar-track {
      background: var(--cream);
    }
    .file-container::-webkit-scrollbar-thumb {
      background: var(--fog);
      border-radius: 4px;
    }
    .file-container::-webkit-scrollbar-thumb:hover {
      background: var(--soil);
    }
  </style>
</head>
<body>
  <header>
    <h1 id="back-btn">📂 File Grove</h1>
    <div class="path-display" id="path-display">No Mount</div>
    <div class="header-actions">
        <button id="mount-btn" class="mount-btn">📂 Mount Folder</button>
    </div>
  </header>

  <div class="file-container" id="file-list">
    <div class="loading-state">Waiting for folder mount...</div>
  </div>

  <script type="module">
    import { mountFolder, isAPIAvailable } from './filesystem-manager.js';

    const fileList = document.getElementById('file-list');
    const pathDisplay = document.getElementById('path-display');
    const mountBtn = document.getElementById('mount-btn');
    const backBtn = document.getElementById('back-btn');

    // State
    let currentDirHandle = null;
    let currentPathParts = []; // Array of names to reconstruct path visually
    const pathToHandleMap = new Map();

    // Check API availability on load
    if (!isAPIAvailable()) {
      mountBtn.disabled = true;
      mountBtn.title = "File System Access API not supported in this browser";
      fileList.innerHTML = '<div class="empty-state">Your browser does not support the File System Access API. Please use Chrome, Edge, or Opera.</div>';
    }

    // Helper to determine icon based on extension or type
    function getIcon(name, type) {
      if (type === 'directory') return '📁';
      const ext = name.split('.').pop().toLowerCase();
      const icons = {
        'js': '📜',
        'html': '📄',
        'css': '🎨',
        'png': '🖼️',
        'jpg': '🖼️',
        'json': '📋',
        'txt': '📝',
        'md': '📝'
      };
      return icons[ext] || '📃';
    }

    // Render files from the current DirectoryHandle
    async function renderFilesFromHandle(dirHandle) {
      fileList.innerHTML = '<div class="loading-state">Loading...</div>';
      
      try {
        const items = [];
        
        // Use the File System Access API to list entries
        for await (const entry of dirHandle.entries()) {
          const [name, handle] = entry;
          items.push({
            name,
            type: handle.kind, // 'file' or 'directory'
            handle: handle
          });
        }

        // Sort: Folders first, then files, alphabetically
        const sortedItems = items.sort((a, b) => {
          if (a.type === 'directory' && b.type !== 'directory') return -1;
          if (a.type !== 'directory' && b.type === 'directory') return 1;
          return a.name.localeCompare(b.name);
        });

        fileList.innerHTML = '';

        if (sortedItems.length === 0) {
          fileList.innerHTML = '<div class="empty-state">This grove is empty.</div>';
          return;
        }

        sortedItems.forEach(item => {
          const div = document.createElement('div');
          div.className = 'file-item';
          
          const icon = document.createElement('div');
          icon.className = 'file-icon ' + (item.type === 'directory' ? 'folder-icon' : 'file-icon-default');
          icon.textContent = getIcon(item.name, item.type);
          
          const name = document.createElement('div');
          name.className = 'file-name';
          name.textContent = item.name;

          div.appendChild(icon);
          div.appendChild(name);

          // Click handler
          div.addEventListener('click', () => {
            if (item.type === 'directory') {
              navigateToDirectory(item.handle, item.name);
            } else {
              // Select file
              // Send message to parent (if in iframe) or handle locally
              window.parent.postMessage({
                type: 'teatreeos-file-selected',
                path: currentPathParts.join('/') + '/' + item.name,
                name: item.name,
                handle: item.handle 
              }, '*');
            }
          });

          fileList.appendChild(div);
        });

      } catch (error) {
        console.error("Error listing directory:", error);
        fileList.innerHTML = '<div class="empty-state">Error loading files. Permissions might be denied.</div>';
      }
    }

    // Handle navigation into a subdirectory
    function navigateToDirectory(newDirHandle, name) {
      const currentPathStr = currentPathParts.join('/');
      if (currentPathStr) {
          pathToHandleMap.set(currentPathStr, currentDirHandle);
      }

      currentDirHandle = newDirHandle;
      currentPathParts.push(name);
      
      // Store the new path in map for back navigation
      const newFullPathStr = currentPathParts.join('/');
      pathToHandleMap.set(newFullPathStr, newDirHandle);
      
      // Update UI
      pathDisplay.textContent = '/' + currentPathParts.join('/');
      
      // Render new contents
      renderFilesFromHandle(newDirHandle);
    }

    // Handle navigation up (parent directory)
    function navigateUp() {
      if (currentPathParts.length === 0) return;
      
      const parentPathStr = currentPathParts.slice(0, -1).join('/');
      const parentHandle = pathToHandleMap.get(parentPathStr);
      
      if (parentHandle) {
          currentPathParts.pop();
          currentDirHandle = parentHandle;
          pathDisplay.textContent = currentPathParts.length === 0 ? '/' : '/' + currentPathParts.join('/');
          renderFilesFromHandle(currentDirHandle);
      } else {
          // Fallback: If we can't find the parent in the map, we might be at the root
          // or the map didn't capture the root.
          if (currentPathParts.length === 1) {
              // We are trying to go up from a subdirectory to the root
              // We need to find the root handle. 
              // In this simple implementation, we don't store the root handle globally 
              // unless we get it from the mount event.
              // Let's check if we have a root handle stored in a variable
              if (window.rootHandle) {
                  currentPathParts = [];
                  currentDirHandle = window.rootHandle;
                  pathDisplay.textContent = '/';
                  renderFilesFromHandle(currentDirHandle);
              } else {
                  alert("Cannot navigate up further. This is the root of the mounted folder.");
              }
          } else {
              alert("Could not determine parent directory.");
          }
      }
    }

    // Mount Folder Button Logic
    mountBtn.addEventListener('click', async () => {
        try {
            const dirHandle = await mountFolder();
            if (dirHandle) {
                // Reset state
                currentDirHandle = dirHandle;
                currentPathParts = [];
                pathToHandleMap.clear();
                pathToHandleMap.set('', dirHandle); // Store root with empty key
                
                // Store root handle globally for "back to root" fallback
                window.rootHandle = dirHandle;

                // Update UI
                pathDisplay.textContent = '/';
                
                // Render contents
                renderFilesFromHandle(dirHandle);
                
                // Notify parent (if this is an iframe)
                window.parent.postMessage({
                    type: 'teatreeos-mount-folder',
                    handle: dirHandle,
                    path: '/'
                }, '*');
            }
        } catch (err) {
            console.error("Mount failed:", err);
            if (err.message !== 'Folder selection cancelled') {
                alert("Failed to mount folder: " + err.message);
            }
        }
    });

    // Back Button Logic (Clicking the title)
    backBtn.addEventListener('click', () => {
        navigateUp();
    });

    // Listen for messages from parent (for iframe usage)
    window.addEventListener('message', (event) => {
      // 1. Handle Mounting from Parent
      if (event.data?.type === 'teatreeos-mount-folder') {
        const handle = event.data.handle;
        if (handle && handle.kind === 'directory') {
          window.rootHandle = handle; // Store for "back to root"
          currentDirHandle = handle;
          currentPathParts = [];
          pathToHandleMap.clear();
          pathToHandleMap.set('', handle);
          pathDisplay.textContent = '/';
          renderFilesFromHandle(handle);
        }
      }
    });

    // Initial state
    pathDisplay.textContent = '/';
  </script>
</body>
</html>
