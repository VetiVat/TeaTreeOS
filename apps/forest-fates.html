<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Fates</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/cursors.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--cream);
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    .header {
      text-align: center;
      margin-bottom: 4px;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--bark);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .header-icon {
      font-size: 1.3rem;
    }

    .dice-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 140px;
      overflow-y: auto;
    }

    .dice-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--fog);
      padding: 8px;
      border-radius: var(--radius-md);
      border: 1px solid var(--lichen);
    }

    .dice-label {
      min-width: 45px;
      font-weight: 600;
      color: var(--bark);
      font-size: 0.85rem;
    }

    .quantity-input {
      width: 45px;
      padding: 5px;
      background: var(--cream);
      border: 1px solid var(--lichen);
      border-radius: var(--radius-sm);
      color: var(--text-dark);
      font-size: 0.8rem;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 6px;
    }

    .cast-btn {
      flex: 1;
      padding: 8px 12px;
      background: var(--moss);
      color: var(--text-light);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all var(--transition-fast);
    }

    .cast-btn:hover {
      background: var(--fern);
      transform: translateY(-2px);
    }

    .cast-btn:active {
      transform: translateY(0);
    }

    .reset-btn {
      padding: 8px 12px;
      background: var(--soil);
      color: var(--text-light);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all var(--transition-fast);
    }

    .reset-btn:hover {
      background: var(--bark);
    }

    .history {
      flex: 1;
      overflow-y: auto;
      background: white;
      border: 1px solid var(--lichen);
      border-radius: var(--radius-md);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .roll-entry {
      padding: 10px;
      background: var(--fog);
      border-left: 3px solid var(--moss);
      border-radius: var(--radius-sm);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .roll-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-weight: 600;
      color: var(--bark);
      font-size: 0.9rem;
    }

    .roll-time {
      font-size: 0.7rem;
      color: var(--soil);
    }

    .roll-values {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }

    .value-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 6px;
      background: var(--cream);
      border: 1px solid var(--lichen);
      border-radius: var(--radius-sm);
      color: var(--text-dark);
      font-weight: 600;
      font-size: 0.8rem;
    }

    .roll-total {
      padding-top: 6px;
      border-top: 1px solid var(--lichen);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--moss);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--soil);
      text-align: center;
      gap: 8px;
    }

    .empty-icon {
      font-size: 2.5rem;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 0.9rem;
      font-style: italic;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--lichen);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--soil);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="header-icon">🌲</span>Forest Fates</h1>
  </div>

  <div class="dice-section" id="diceSection"></div>

  <div class="controls">
    <button class="cast-btn" id="castBtn" type="button">Cast Runes</button>
    <button class="reset-btn" id="resetBtn" type="button">Clear All</button>
  </div>

  <div class="history" id="history">
    <div class="empty-state">
      <div class="empty-icon">🌿</div>
      <div class="empty-text">Set your dice and cast your runes...</div>
    </div>
  </div>

  <script>
    const DICE_TYPES = [
      { sides: 2, label: 'd2' },
      { sides: 4, label: 'd4' },
      { sides: 6, label: 'd6' },
      { sides: 8, label: 'd8' },
      { sides: 10, label: 'd10' },
      { sides: 20, label: 'd20' },
      { sides: 100, label: 'd100' },
    ];

    const MAX_HISTORY = 20;

    // DOM elements
    const diceSection = document.getElementById('diceSection');
    const castBtn = document.getElementById('castBtn');
    const resetBtn = document.getElementById('resetBtn');
    const history = document.getElementById('history');

    // State
    let diceQuantities = {};
    let rolls = [];

    // Initialize dice quantities
    DICE_TYPES.forEach(die => {
      diceQuantities[die.sides] = 0;
    });

    // Initialize UI
    function initializeDice() {
      diceSection.innerHTML = '';
      
      DICE_TYPES.forEach((die) => {
        const row = document.createElement('div');
        row.className = 'dice-row';
        
        const label = document.createElement('span');
        label.className = 'dice-label';
        label.textContent = die.label;
        
        const input = document.createElement('input');
        input.type = 'number';
        input.className = 'quantity-input';
        input.min = '0';
        input.max = '20';
        input.value = '0';
        input.dataset.sides = die.sides;
        input.addEventListener('change', (e) => {
          diceQuantities[die.sides] = Math.max(0, Math.min(20, parseInt(e.target.value) || 0));
          e.target.value = diceQuantities[die.sides];
        });
        
        row.appendChild(label);
        row.appendChild(input);
        diceSection.appendChild(row);
      });
    }

    // Cast runes (roll all selected dice)
    function castRunes() {
      // Check if at least one die is selected
      const totalDice = Object.values(diceQuantities).reduce((a, b) => a + b, 0);
      
      if (totalDice === 0) {
        alert('Select at least one die to roll');
        return;
      }

      const allResults = [];
      const diceBreakdown = [];

      // Roll each die type
      DICE_TYPES.forEach((die) => {
        const quantity = diceQuantities[die.sides];
        if (quantity > 0) {
          const results = [];
          for (let i = 0; i < quantity; i++) {
            results.push(Math.floor(Math.random() * die.sides) + 1);
          }
          allResults.push(...results);
          diceBreakdown.push({
            label: die.label,
            quantity: quantity,
            results: results,
          });
        }
      });

      const total = allResults.reduce((a, b) => a + b, 0);

      const roll = {
        breakdown: diceBreakdown,
        allResults: allResults,
        total: total,
        timestamp: new Date().toLocaleTimeString(),
      };

      rolls.unshift(roll);

      // Keep only last 20 rolls
      if (rolls.length > MAX_HISTORY) {
        rolls = rolls.slice(0, MAX_HISTORY);
      }

      renderHistory();
    }

    // Render roll history
    function renderHistory() {
      if (rolls.length === 0) {
        history.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🌿</div>
            <div class="empty-text">Set your dice and cast your runes...</div>
          </div>
        `;
        return;
      }

      history.innerHTML = rolls.map(roll => {
        const diceLabels = roll.breakdown.map(b => `${b.quantity}×${b.label}`).join(' + ');
        return `
          <div class="roll-entry">
            <div class="roll-header">
              <span>${diceLabels}</span>
              <span class="roll-time">${roll.timestamp}</span>
            </div>
            <div class="roll-values">
              ${roll.allResults.map(val => `<span class="value-badge">${val}</span>`).join('')}
            </div>
            <div class="roll-total">Total: ${roll.total}</div>
          </div>
        `;
      }).join('');
    }

    // Reset everything
    function resetAll() {
      if (confirm('Clear all rolls and reset dice?')) {
        // Clear roll history
        rolls = [];
        
        // Reset all dice quantities to 0
        DICE_TYPES.forEach(die => {
          diceQuantities[die.sides] = 0;
        });
        
        // Reset UI inputs
        document.querySelectorAll('.quantity-input').forEach(input => {
          input.value = '0';
        });
        
        // Re-render history
        renderHistory();
      }
    }

    // Clear on page unload
    window.addEventListener('beforeunload', () => {
      rolls = [];
      DICE_TYPES.forEach(die => {
        diceQuantities[die.sides] = 0;
      });
    });

    // Event listeners
    castBtn.addEventListener('click', castRunes);
    resetBtn.addEventListener('click', resetAll);

    // Allow Enter key to cast runes
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.classList.contains('quantity-input')) {
        castRunes();
      }
    });

    // Initialize
    initializeDice();
    renderHistory();
  </script>
</body>
</html>
