/* ── FILE MANAGER ─────────────────────────────────────── */
AppRegistry.register({
  id:'files', name:'Files', icon:'🗂️',
  launch({path}={}) {
    let currentPath = path || '/home/user';
    let selectedItem = null;
    let dragState    = null;   // { path, type, name, srcMounted }
    let listDndBound = false;

    // ── Cross-filesystem move engine ─────────────────────
    // Handles all four combos: VFS→VFS, VFS→Host, Host→VFS, Host→Host
    async function moveItem(src, destDir) {
      const destDirClean = destDir.replace(/\/$/, '');
      const destPath     = destDirClean + '/' + src.name;
      const destMounted  = MountManager.isMountedPath(destDir);
      if (destPath === src.path) return; // dropped on itself

      try {
        if (src.type === 'dir') {
          if (src.srcMounted || destMounted) {
            Notify.send('Files', 'Moving directories across filesystems is not supported.', 'warn'); return;
          }
          // VFS → VFS: re-parent the node directly (zero-copy)
          const r = VFS.mv(src.path, destDirClean);
          if (r.error) throw new Error(r.error);
        } else {
          // Read from source
          let content;
          if (src.srcMounted) {
            content = await MountManager.readFile(src.path);
          } else {
            const r = VFS.cat(src.path);
            if (r.error) throw new Error(r.error);
            content = r.content ?? '';
          }
          // Write to destination
          if (destMounted) { await MountManager.writeFile(destPath, content); }
          else              { VFS.write(destPath, content); }
          // Delete from source
          if (src.srcMounted) { await MountManager.rm(src.path); }
          else                 { VFS.rm(src.path); }
        }
        const tag = `${src.srcMounted?'[host]':'[TeaTree]'} → ${destMounted?'[host]':'[TeaTree]'}`;
        Notify.send('Moved', `${src.name}  ${tag}`);
      } catch(e) { Notify.send('Move Error', e.message, 'error'); }
    }

    function clearDropHighlights() {
      wrap.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    }

    const wrap = document.createElement('div'); wrap.className = 'fm-body';

    // ── Toolbar ─────────────────────────────────────────
    const tb         = document.createElement('div'); tb.className = 'fm-toolbar';
    const btnBack    = document.createElement('button'); btnBack.className='fm-btn-sm'; btnBack.textContent='‹'; btnBack.title='Go up';
    const pathBar    = document.createElement('div');    pathBar.className='fm-path-bar';
    const btnHostImp = document.createElement('button'); btnHostImp.className='fm-btn-sm'; btnHostImp.textContent='📥'; btnHostImp.title='Import host file into this folder';
    const btnAddDrv  = document.createElement('button'); btnAddDrv.className='fm-btn-sm';  btnAddDrv.textContent='🔗'; btnAddDrv.title='Mount a new host folder';
    const btnRefresh = document.createElement('button'); btnRefresh.className='fm-btn-sm'; btnRefresh.textContent='↺'; btnRefresh.title='Refresh';
    tb.append(btnBack, pathBar, btnHostImp, btnAddDrv, btnRefresh);

    // ── Split layout ─────────────────────────────────────
    const split  = document.createElement('div'); split.className = 'fm-split';
    const sbar   = document.createElement('div'); sbar.className  = 'fm-sidebar';
    const main   = document.createElement('div'); main.className  = 'fm-main';
    const list   = document.createElement('div'); list.className  = 'fm-list';
    const status = document.createElement('div'); status.className = 'fm-status';
    main.append(list); split.append(sbar, main); wrap.append(tb, split, status);

    // ── Sidebar builder ──────────────────────────────────
    function buildSidebar() {
      sbar.innerHTML = '';
      const bookmarks = [
        { icon:'🏠', label:'Home',      path:'/home/user' },
        { icon:'🖥️', label:'Desktop',   path:'/home/user/Desktop' },
        { icon:'📄', label:'Documents', path:'/home/user/Documents' },
        { icon:'📥', label:'Downloads', path:'/home/user/Downloads' },
      ];
      const lbl1 = document.createElement('div'); lbl1.className='fm-sb-label'; lbl1.textContent='Bookmarks';
      sbar.appendChild(lbl1);
      bookmarks.forEach(b => {
        const row = document.createElement('div');
        row.className = 'fm-sb-item' + (currentPath===b.path?' active':'');
        row.innerHTML = `<span class="fm-sb-item-icon">${b.icon}</span><span>${b.label}</span>`;
        row.addEventListener('click', () => { currentPath=b.path; render(); });
        // Drop target — move dragged item into this bookmark's folder
        row.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; row.classList.add('drag-over'); });
        row.addEventListener('dragleave', e => { if(!row.contains(e.relatedTarget)) row.classList.remove('drag-over'); });
        row.addEventListener('drop', async e => {
          e.preventDefault(); row.classList.remove('drag-over');
          if (!dragState) return;
          await moveItem(dragState, b.path);
          dragState = null; render();
        });
        sbar.appendChild(row);
      });

      const mnts = MountManager.getMounts();
      if (mnts.length) {
        const sep = document.createElement('div'); sep.className='fm-sb-sep'; sbar.appendChild(sep);
        const lbl2 = document.createElement('div'); lbl2.className='fm-sb-label'; lbl2.textContent='Drives';
        sbar.appendChild(lbl2);
        mnts.forEach(m => {
          const mp  = '/media/' + m.name;
          const row = document.createElement('div');
          row.className = 'fm-sb-item' + (currentPath.startsWith(mp)?' active':'');
          row.innerHTML = `<span class="fm-sb-item-icon">💾</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHTML(m.name)}</span><span class="fm-eject" title="Unmount">⏏</span>`;
          row.querySelector('.fm-eject').addEventListener('click', async e => {
            e.stopPropagation();
            await MountManager.unmount(m.id);
            if (currentPath.startsWith(mp)) currentPath = '/home/user';
            buildSidebar(); render();
          });
          row.addEventListener('click', e => { if(e.target.classList.contains('fm-eject'))return; currentPath=mp; render(); });
          // Drop target — move dragged item into this drive's root
          row.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; row.classList.add('drag-over'); });
          row.addEventListener('dragleave', e => { if(!row.contains(e.relatedTarget)) row.classList.remove('drag-over'); });
          row.addEventListener('drop', async e => {
            e.preventDefault(); row.classList.remove('drag-over');
            if (!dragState) return;
            await moveItem(dragState, mp);
            dragState = null; render();
          });
          sbar.appendChild(row);
        });
      }
    }

    // ── Render current directory (sync VFS or async mount) ─
    async function render() {
      list.innerHTML = ''; selectedItem = null;
      pathBar.textContent = currentPath;
      buildSidebar();

      let entries;
      try {
        if (MountManager.isMountedPath(currentPath)) {
          status.textContent = 'Loading…';
          document.body.classList.add('loading');
          entries = await MountManager.ls(currentPath);
          document.body.classList.remove('loading');
        } else {
          const r = VFS.ls(currentPath);
          if (r.error) { status.textContent = r.error; return; }
          entries = r.files;
        }
      } catch(e) {
        document.body.classList.remove('loading');
        status.textContent = 'Error: ' + e.message;
        return;
      }

      const sorted = [...entries].sort((a,b) => {
        if (a.type !== b.type) return a.type==='dir' ? -1 : 1;
        return a.name.localeCompare(b.name);
      });

      sorted.forEach(f => {
        const isMounted  = MountManager.isMountedPath(currentPath);
        const fullPath   = currentPath.replace(/\/$/, '') + '/' + f.name;
        const ftype      = f.type === 'dir' ? 'dir' : getFileType(f.name);
        const iconEmoji  = f.type === 'dir' ? '📁' : fileIcon(f.name, ftype);
        const iconClass  = ftype === 'image' ? 'icon-img' : ftype === 'video' ? 'icon-vid' : ftype === 'audio' ? 'icon-audio' : '';
        const d = document.createElement('div'); d.className = 'fm-item';
        d.setAttribute('draggable', 'true');
        d.innerHTML = `<span class="fm-item-icon ${iconClass}">${iconEmoji}</span>
          <span class="fm-item-name">${escapeHTML(f.name)}</span>
          <span class="fm-item-type">${ftype}${isMounted?' · host':''}</span>`;

        // ── Selection ──────────────────────────────────
        d.addEventListener('click', () => {
          list.querySelectorAll('.fm-item').forEach(x => x.classList.remove('selected'));
          d.classList.add('selected'); selectedItem = f;
          status.textContent = `Selected: ${f.name}`;
        });
        d.addEventListener('dblclick', async () => {
          if (f.type === 'dir') { currentPath = fullPath; render(); return; }
          openFile(fullPath, f.name);
        });

        // ── Drag source ────────────────────────────────
        d.addEventListener('dragstart', e => {
          dragState = { path: fullPath, type: f.type, name: f.name, srcMounted: isMounted };
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', fullPath);
          setTimeout(() => d.classList.add('dragging'), 0);
        });
        d.addEventListener('dragend', () => { d.classList.remove('dragging'); clearDropHighlights(); dragState = null; });

        // ── Drop target (directories only) ────────────
        if (f.type === 'dir') {
          d.addEventListener('dragover', e => {
            if (!dragState || dragState.path === fullPath) return;
            e.preventDefault(); e.dataTransfer.dropEffect = 'move';
            d.classList.add('drag-over');
          });
          d.addEventListener('dragleave', e => { if (!d.contains(e.relatedTarget)) d.classList.remove('drag-over'); });
          d.addEventListener('drop', async e => {
            e.preventDefault(); e.stopPropagation(); d.classList.remove('drag-over');
            if (!dragState || dragState.path === fullPath) return;
            const src = dragState; dragState = null;
            await moveItem(src, fullPath);
            render();
          });
        }

        list.appendChild(d);
      });

      // ── List area as drop zone (drop into current dir) ─
      if (!listDndBound) {
        listDndBound = true;
        list.addEventListener('dragover', e => {
          if (e.target.closest('.fm-item')) return; // let folder items handle it
          if (!dragState) return;
          e.preventDefault(); e.dataTransfer.dropEffect = 'move';
          list.classList.add('drag-over');
        });
        list.addEventListener('dragleave', e => {
          if (!list.contains(e.relatedTarget)) list.classList.remove('drag-over');
        });
        list.addEventListener('drop', async e => {
          list.classList.remove('drag-over');
          if (e.target.closest('.fm-item')) return; // handled by folder
          if (!dragState) return;
          e.preventDefault();
          // Don't move into the same directory
          const destNorm = currentPath.replace(/\/$/, '');
          const srcDir   = dragState.path.split('/').slice(0, -1).join('/');
          if (srcDir === destNorm) { dragState = null; return; }
          const src = dragState; dragState = null;
          await moveItem(src, currentPath);
          render();
        });


      
      }
      status.textContent = `${sorted.length} item(s)  ·  ${currentPath}${MountManager.isMountedPath(currentPath)?' [host drive]':''}`;
    }

    // ── Toolbar handlers ──────────────────────────────────
    btnBack.addEventListener('click', () => {
      const p = currentPath.split('/').slice(0, -1).join('/') || '/';
      currentPath = p; render();
    });
    btnRefresh.addEventListener('click', render);
    btnHostImp.addEventListener('click', () => HostFS.importFile(currentPath, () => render()));
    btnAddDrv.addEventListener('click', async () => {
      const rec = await MountManager.pickAndMount();
      if (rec) { currentPath = '/media/' + rec.name; render(); }
    });

    // ── Context menu ──────────────────────────────────────
    list.addEventListener('contextmenu', e => {
      e.preventDefault(); e.stopPropagation();
      const isMnt = MountManager.isMountedPath(currentPath);
      CtxMenu.show(e.clientX, e.clientY, [
        {icon:'📁', label:'New Folder', action: async () => {
          const n = await Dialog.promptInput({ icon:'📁', title:'New Folder', msg:'Choose a folder name.', placeholder:'Folder name' }); if (!n) return;
          if (isMnt) { try { await MountManager.mkdir(currentPath+'/'+n); } catch(err) { Notify.send('Error',err.message,'error'); } }
          else VFS.mkdir(currentPath+'/'+n);
          render();
        }},
        {icon:'📄', label:'New File', action: async () => {
          const n = await Dialog.promptInput({ icon:'📄', title:'New File', msg:'Choose a file name.', placeholder:'notes.txt' }); if (!n) return;
          if (isMnt) { try { await MountManager.writeFile(currentPath+'/'+n, ''); } catch(err) { Notify.send('Error',err.message,'error'); } }
          else VFS.touch(currentPath+'/'+n);
          render();
        }},
        {icon:'📥', label:'Import from Host', action: () => HostFS.importFile(currentPath, () => render())},
        {sep: true},
        {icon:'📤', label:'Export Selected to Host', action: async () => {
          if (!selectedItem || selectedItem.type==='dir') { Notify.send('Files','Select a file first.','warn'); return; }
          const fp = currentPath+'/'+selectedItem.name;
          try {
            const content = isMnt ? await MountManager.readFile(fp) : (VFS.cat(fp).content || '');
            HostFS.exportFile(fp, content);
          } catch(e) { Notify.send('Error', e.message, 'error'); }
        }},
        {sep: true},
        {icon:'🗑️', label:'Delete Selected', danger: true, action: async () => {
          if (!selectedItem) return;
          const fp = currentPath+'/'+selectedItem.name;
          if (isMnt) { try { await MountManager.rm(fp); } catch(e) { Notify.send('Error',e.message,'error'); } }
          else VFS.rm(fp, true);
          render();
        }},
      ]);
    });

    // Re-render sidebar when mounts change (e.g. from Drives app)
    EventBus.on('mounts:changed', buildSidebar);

    render();
    WM.create({ appId:'files', title:'Files', icon:'🗂️', width:580, height:420, content:wrap, minWidth:360, minHeight:220,
      onClose: () => EventBus.off('mounts:changed', buildSidebar) });
  }
});

/* ── CHAT (FIRESTORE POWERED WITH PRESENCE) ─────────────────── */
AppRegistry.register({
  id: 'chat', name: 'TeaChat', icon: '👥',
  launch() {
    const rooms = ['Global Lounge', 'Development', 'Support', 'Off-Topic'];
    let currentRoom = 'Global Lounge';
    let msgUnsubscribe = null;
    let userUnsubscribe = null;

    const wrap = document.createElement('div'); wrap.className = 'chat-body';
    wrap.innerHTML = `
      <div class="chat-sidebar">
        <div class="chat-rooms-lbl">Rooms</div>
        <div class="chat-rooms-list"></div>
      </div>
      <div class="chat-main">
        <div class="chat-header">
          <div style="font-weight:600; font-size:0.85rem;" id="active-room-name"># Global Lounge</div>
          <div class="chat-status"><span class="u-online"></span> ${OS_META.user} (Online)</div>
        </div>
        <div class="chat-messages" id="chat-msg-container"></div>
        <div class="chat-input-area">
          <div class="chat-input-row">
            <input type="text" class="chat-input" placeholder="Type a message..." id="chat-input-field">
            <button class="editor-btn primary" id="chat-send-btn">Send</button>
          </div>
        </div>
      </div>
      <div class="chat-user-sidebar">
        <div class="chat-users-lbl">Online</div>
        <div class="chat-users-list" id="chat-user-list"></div>
      </div>
    `;

    const msgContainer = wrap.querySelector('#chat-msg-container');
    const userListContainer = wrap.querySelector('#chat-user-list');
    const inputField = wrap.querySelector('#chat-input-field');
    const roomList = wrap.querySelector('.chat-rooms-list');

    function renderMessage(user, text, timestamp) {
      const msg = document.createElement('div');
      msg.className = 'chat-msg';
      let timeStr = timestamp?.seconds 
        ? new Date(timestamp.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + " (sending...)";
      
      msg.innerHTML = `
        <div class="chat-msg-meta">
          <span class="chat-msg-user">${escapeHTML(user)}</span>
          <span class="chat-msg-time">${timeStr}</span>
        </div>
        <div class="chat-msg-text">${escapeHTML(text)}</div>
      `;
      msgContainer.appendChild(msg);
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    async function loadRoom(roomName) {
      if (msgUnsubscribe) msgUnsubscribe();
      if (userUnsubscribe) userUnsubscribe();
      
      msgContainer.innerHTML = '';
      currentRoom = roomName;
      wrap.querySelector('#active-room-name').textContent = '# ' + roomName;

      // 1. Join Presence (Register self in this room)
      const userRef = collection(db, "presence");
      const qUser = query(userRef, where("username", "==", OS_META.user));
      const existing = await getDocs(qUser);
      
      const batch = writeBatch(db);
      existing.forEach(d => batch.delete(d.ref));
      await batch.commit();

      await addDoc(collection(db, "presence"), {
        username: OS_META.user,
        room: roomName,
        lastActive: serverTimestamp()
      });

      // 2. Listen for Messages
      const oneHourAgo = new Date(Date.now() - (60 * 60 * 1000));
      const qMsg = query(
        collection(db, "chats", roomName, "messages"),
        where("createdAt", ">", oneHourAgo),
        orderBy("createdAt", "asc")
      );
      msgUnsubscribe = onSnapshot(qMsg, (snapshot) => {
        msgContainer.innerHTML = '';
        snapshot.forEach(doc => renderMessage(doc.data().user, doc.data().text, doc.data().createdAt));
      });

      // 3. Listen for Users in this room
      const qPresence = query(collection(db, "presence"), where("room", "==", roomName));
      userUnsubscribe = onSnapshot(qPresence, (snapshot) => {
        userListContainer.innerHTML = '';
        const activeUsers = new Set();
        snapshot.forEach(doc => {
          const u = doc.data().username;
          if (!activeUsers.has(u)) {
            activeUsers.add(u);
            const uEl = document.createElement('div');
            uEl.className = 'chat-user-item';
            uEl.innerHTML = `<div class="status-dot"></div><span>${escapeHTML(u)}</span>`;
            userListContainer.appendChild(uEl);
          }
        });
      });
    }

    const handleSend = async () => {
      const text = inputField.value.trim();
      if (!text) return;
      inputField.value = '';
      await addDoc(collection(db, "chats", currentRoom, "messages"), {
        user: OS_META.user,
        text: text,
        createdAt: serverTimestamp()
      });
    };

    wrap.querySelector('#chat-send-btn').onclick = handleSend;
    inputField.onkeydown = (e) => { if (e.key === 'Enter') handleSend(); };

    rooms.forEach(r => {
      const item = document.createElement('div');
      item.className = `chat-room-item ${r === currentRoom ? 'active' : ''}`;
      item.innerHTML = `<span>#</span> ${r}`;
      item.onclick = () => {
        wrap.querySelectorAll('.chat-room-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        loadRoom(r);
      };
      roomList.appendChild(item);
    });

    loadRoom(currentRoom);

    WM.create({
      appId: 'chat', title: 'TeaChat', icon: '👥',
      width: 750, height: 450, content: wrap,
      onClose: async () => {
        if (msgUnsubscribe) msgUnsubscribe();
        if (userUnsubscribe) userUnsubscribe();
        const q = query(collection(db, "presence"), where("username", "==", OS_META.user));
        const snap = await getDocs(q);
        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit();
      }
    });
  }
});

/* ── TEXT EDITOR ──────────────────────────────────────── */
AppRegistry.register({
  id:'editor', name:'Editor', icon:'📝',
  launch({ file, preContent } = {}) {
    const filename = file || (getDefaultSavePath() + '/untitled.txt');
    let saved = true, currentFile = filename;
    let isMountedFile = MountManager.isMountedPath(filename);

    const wrap    = document.createElement('div'); wrap.className = 'editor-body';
    const tb      = document.createElement('div'); tb.className   = 'editor-toolbar';
    const btnNew    = document.createElement('button'); btnNew.className='editor-btn';          btnNew.textContent='New';
    const btnOpen   = document.createElement('button'); btnOpen.className='editor-btn';         btnOpen.textContent='Open';
    const btnImport = document.createElement('button'); btnImport.className='editor-btn';       btnImport.textContent='Import'; btnImport.title='Import a host file into TeaTreeOS';
    const btnSave   = document.createElement('button'); btnSave.className='editor-btn primary'; btnSave.textContent='Save';
    const btnExport = document.createElement('button'); btnExport.className='editor-btn';       btnExport.textContent='Export ↓'; btnExport.title='Export a copy to your host computer';
    const fnLabel   = document.createElement('span');   fnLabel.className='editor-filename';    fnLabel.textContent=currentFile;
    tb.append(btnNew, btnOpen, btnImport, btnSave, btnExport, fnLabel);

    const textarea  = document.createElement('textarea'); textarea.className='editor-textarea'; textarea.placeholder='Start typing…';
    const statusBar = document.createElement('div');      statusBar.className='editor-status';
    wrap.append(tb, textarea, statusBar);

    // Load initial content ─────────────────────────────
    if (preContent !== undefined) {
      // Pre-loaded by Files app (async mount read already done)
      textarea.value = preContent;
    } else if (file) {
      if (MountManager.isMountedPath(file)) {
        // Async read from host drive
        MountManager.readFile(file)
          .then(c => { textarea.value = c; markSaved(); updateStatus(); })
          .catch(e => Notify.send('Read Error', e.message, 'error'));
      } else {
        const r = VFS.cat(file);
        if (!r.error && r.content !== undefined) textarea.value = r.content;
      }
    }

    function updateStatus() {
      const lines = textarea.value.split('\n').length;
      const chars = textarea.value.length;
      const loc   = isMountedFile ? '[host drive]' : '[teatree vfs]';
      statusBar.textContent = `${currentFile.split('/').pop()} ${loc} | Lines: ${lines} | Chars: ${chars} | ${saved ? 'Saved' : '● Unsaved'}`;
    }
    function markUnsaved() { saved=false; fnLabel.textContent='● '+currentFile; updateStatus(); }
    function markSaved()   { saved=true;  fnLabel.textContent=currentFile; updateStatus(); }

    textarea.addEventListener('input', markUnsaved);
    textarea.addEventListener('keydown', e => {
      if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); doSave(); }
      if (e.key==='Tab') { e.preventDefault(); const s=textarea.selectionStart; textarea.value=textarea.value.slice(0,s)+'  '+textarea.value.slice(textarea.selectionEnd); textarea.selectionStart=textarea.selectionEnd=s+2; }
    });

    // Save ─────────────────────────────────────────────
    async function doSave() {
      // NEW LOGIC: If this is an unsaved "untitled" file, check if a drive 
      // was mounted since we opened the window.
      if (currentFile.endsWith('untitled.txt') && !MountManager.isMountedPath(currentFile)) {
        const freshDefault = getDefaultSavePath() + '/untitled.txt';
        if (MountManager.isMountedPath(freshDefault)) {
          currentFile = freshDefault;
        }
      }

      isMountedFile = MountManager.isMountedPath(currentFile);
      
      if (isMountedFile) {
        // Write directly back to the host filesystem
        try {
          await MountManager.writeFile(currentFile, textarea.value);
          markSaved();
          Notify.send('💾 Saved to Host', currentFile.split('/').pop());
        } catch(e) { Notify.send('Save Error', e.message, 'error'); }
      } else {
        // TeaTreeOS VFS save logic...
        const r = VFS.write(currentFile, textarea.value);
        if (r.error) { Notify.send('Editor Error', r.error, 'error'); return; }
        markSaved();
        Dialog.show({
          icon: '💾', title: 'File Saved',
          msg: 'Saved to TeaTreeOS. Would you also like to export a copy to your real computer?',
          detail: currentFile,
          buttons: [
            { label:'Export to Host ↓', primary:true, action:() => HostFS.exportFile(currentFile, textarea.value) },
            { label:'Keep in TeaTreeOS only', action: null }
          ]
        });
      }
    }

    // Export ───────────────────────────────────────────
    async function doExport() {
      if (isMountedFile) {
        // For mounted files just download a copy; the host already has it
        HostFS.exportFile(currentFile, textarea.value);
      } else {
        const r = VFS.write(currentFile, textarea.value);
        if (r.error) { Notify.send('Editor Error', r.error, 'error'); return; }
        markSaved(); HostFS.exportFile(currentFile, textarea.value);
      }
    }

    // Import from host ─────────────────────────────────
    function doImport() {
      if (!saved) {
        Dialog.show({ icon:'⚠️', title:'Unsaved Changes',
          msg:'Importing will replace current content. Continue?',
          buttons:[
            { label:'Import Anyway', primary:true, action: runImport },
            { label:'Cancel', action: null }
          ]
        });
      } else runImport();
    }
    function runImport() {
      HostFS.importFile('/home/user/Downloads', ({ name, content }) => {
        textarea.value = content;
        currentFile = '/home/user/Downloads/' + name;
        isMountedFile = false;
        fnLabel.textContent = currentFile;
        markSaved(); updateStatus();
      });
    }

    async function doNew() {
      if (!saved && !(await Dialog.confirm({ icon:'⚠️', title:'Unsaved Changes', msg:'Discard unsaved changes?' }))) return;
      
      textarea.value = ''; 
      // Check for mounts when creating a fresh document
      currentFile = getDefaultSavePath() + '/untitled.txt'; 
      isMountedFile = MountManager.isMountedPath(currentFile);
      
      fnLabel.textContent = currentFile; 
      markSaved(); updateStatus(); // Added to refresh the UI footer
    }
    async function doOpen() {
      const p = await Dialog.promptInput({ icon:'📄', title:'Open File', msg:'Enter a TeaTreeOS or mounted-drive path.', value:currentFile, placeholder:'/home/user/Documents/readme.txt' }); if (!p) return;
      if (MountManager.isMountedPath(p)) {
        MountManager.readFile(p)
          .then(c => { textarea.value=c; currentFile=p; isMountedFile=true; fnLabel.textContent=p; markSaved(); updateStatus(); })
          .catch(e => Notify.send('Error', e.message, 'error'));
      } else {
        const r = VFS.cat(p);
        if (r.error) { Notify.send('Error', r.error, 'error'); return; }
        textarea.value=r.content||''; currentFile=p; isMountedFile=false; fnLabel.textContent=p; markSaved();
      }
    }

    btnNew.addEventListener('click',    doNew);
    btnOpen.addEventListener('click',   doOpen);
    btnImport.addEventListener('click', doImport);
    btnSave.addEventListener('click',   doSave);
    btnExport.addEventListener('click', doExport);

    updateStatus();
    WM.create({ appId:'editor', title:`Editor — ${filename.split('/').pop()}`, icon:'📝', width:560, height:400, content:wrap, minWidth:300, minHeight:200 });
    setTimeout(() => textarea.focus(), 80);
  }
});

/* ─── WEB (TABBED BROWSER) ───────────────────────────────── */
AppRegistry.register({
  id: 'web', name: 'Web', icon: '🌐',
  launch(opts = {}) {
    // Check if Web is already open
    const existing = WM.getWins().find(w => w.appId === 'web');
    if (existing && opts.url) {
      WM.focus(existing.id);
      window.dispatchEvent(new CustomEvent('web:addtab', { detail: opts }));
      return;
    }

    let tabs = [];
    let activeTabId = null;

    const wrap = document.createElement('div'); wrap.className = 'web-body';
    const tabBar = document.createElement('div'); tabBar.className = 'web-tab-bar';
    const nav = document.createElement('div'); nav.className = 'web-nav';
    const viewStack = document.createElement('div'); viewStack.className = 'web-viewstack';

    nav.innerHTML = `
      <button class="media-tb-btn">◀</button>
      <button class="media-tb-btn">▶</button>
      <button class="media-tb-btn">↻</button>
      <div class="web-address-bar">https://teatree.internal/blog</div>
    `;
    wrap.append(tabBar, nav, viewStack);

    function createTab(title, type = 'page', mediaUrl = '', mediaType = '', filePath = '') {
      const id = 'tab-' + Date.now() + Math.random();
      const tabObj = { id, title, type, mediaUrl, mediaType, filePath };
      tabs.push(tabObj);
      renderTabs();
      switchTab(id);
    }

    function switchTab(id) {
      activeTabId = id;
      const tab = tabs.find(t => t.id === id);
      const addr = wrap.querySelector('.web-address-bar');
      if (tab.type === 'blog') addr.textContent = 'https://teatree.internal/blog';
      else if (tab.type === 'media') addr.textContent = 'https://mediashare.local/view/' + tab.title;
      else addr.textContent = 'https://teatree.search/new-tab';
      renderTabs();
    }

    function closeTab(id, e) {
      if (e) e.stopPropagation();
      const tab = tabs.find(t => t.id === id);
      if (tab.type === 'blog') return; // Cannot close the feed
      tabs = tabs.filter(t => t.id !== id);
      if (activeTabId === id) activeTabId = tabs[tabs.length - 1].id;
      renderTabs();
    }

    function renderTabs() {
      tabBar.innerHTML = '';
      viewStack.innerHTML = '';

      tabs.forEach(t => {
        const el = document.createElement('div');
        el.className = `web-tab ${activeTabId === t.id ? 'active' : ''}`;
        el.innerHTML = `
          <span class="web-tab-title">${t.type === 'blog' ? '📔 ' : ''}${escapeHTML(t.title)}</span>
          ${t.type !== 'blog' ? '<span class="web-tab-close">✕</span>' : ''}
        `;
        el.onclick = () => switchTab(t.id);
        const closeBtn = el.querySelector('.web-tab-close');
        if (closeBtn) closeBtn.onclick = (e) => closeTab(t.id, e);
        tabBar.appendChild(el);

        const content = document.createElement('div');
        content.className = `web-content ${activeTabId === t.id ? 'active' : ''}`;
        
        if (t.type === 'blog') {
          content.innerHTML = `<div style="padding:40px; max-width:600px; margin:0 auto;">
            <h1 style="margin-bottom:10px;">The Canopy Feed</h1>
            <p style="color:var(--text-muted); line-height:1.6;">Welcome to your internal blog. This tab stays open to keep you updated on system changes and community uploads.</p>
            <hr style="margin:20px 0; opacity:0.1;">
            <div style="background:var(--surface-1); padding:20px; border-radius:10px; border:1px solid var(--border);">
              <h3 style="color:var(--accent);">v1.3 Canopy Update</h3>
              <p style="font-size:0.8rem; margin-top:5px;">Tabbed browsing is now live. Open any media file to see it in action.</p>
            </div>
          </div>`;
        } else if (t.type === 'media') {
          renderMediaTab(content, t);
        } else {
          content.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; flex:1; color:var(--text-muted);">New Tab Page</div>`;
        }
        viewStack.appendChild(content);
      });

      const newTabBtn = document.createElement('button');
      newTabBtn.className = 'web-new-tab';
      newTabBtn.textContent = '＋';
      newTabBtn.onclick = () => createTab('New Tab');
      tabBar.appendChild(newTabBtn);
    }

    function renderMediaTab(container, tab) {
      let skin = 'skin-ig'; 
      let icon = '🖼️';
      if (tab.mediaType === 'video') { skin = 'skin-yt'; icon = '🎬'; }
      if (tab.mediaType === 'audio') { skin = 'skin-sc'; icon = '🎵'; }
      
      container.classList.add(skin);
      const mediaHtml = document.createElement('div');
      mediaHtml.className = 'web-media-container';
      
      let playerHtml = '';
      if (tab.mediaType === 'image') {
        playerHtml = `<div class="img-canvas" style="height:400px; border-radius:8px;"><img src="${tab.mediaUrl}" style="max-height:100%; object-fit:contain;"></div>`;
      } else if (tab.mediaType === 'video') {
        playerHtml = `<video controls autoplay src="${tab.mediaUrl}" style="width:100%; background:#000; aspect-ratio:16/9; border-radius:8px;"></video>`;
      } else if (tab.mediaType === 'audio') {
        playerHtml = `<div class="audio-player-app" style="background:none; padding:20px;">
          <div class="ap-disc" style="width:80px; height:80px;">🎵</div>
          <audio controls src="${tab.mediaUrl}" style="width:100%; margin-top:10px;"></audio>
        </div>`;
      }

      mediaHtml.innerHTML = `
        <div style="display:flex; gap:20px;">
          <div style="flex:1;">
            ${playerHtml}
            <div class="web-media-meta" style="margin-top:15px;">
              <h2 style="font-size:1.1rem; margin-bottom:5px;">${escapeHTML(tab.title)}</h2>
              <div style="font-size:0.7rem; color:var(--text-muted);">Uploaded via TeaTreeOS • 2 minutes ago</div>
            </div>
            <div style="padding:15px 0; display:flex; gap:10px; font-size:0.7rem;">
               <button class="editor-btn">▲ Like</button>
               <button class="editor-btn">▼ Dislike</button>
               <button class="editor-btn">↪ Share</button>
            </div>
          </div>
          <div class="web-fake-sidebar">
             <div style="font-size:0.7rem; font-weight:bold; margin-bottom:5px;">Up Next</div>
             ${[1,2,3].map(()=>`<div style="height:60px; background:rgba(255,255,255,0.05); border-radius:4px; display:flex; align-items:center; padding:10px; font-size:0.6rem;">Suggested Content...</div>`).join('')}
          </div>
        </div>
      `;
      container.appendChild(mediaHtml);
    }

    // Initial Tab
    createTab('Blog', 'blog');
    
    // If launched with a file
    if (opts.url) createTab(opts.name, 'media', opts.url, opts.mediaType, opts.file);

    // Listener for adding tabs while window is open
    const addTabHandler = (e) => {
      createTab(e.detail.name, 'media', e.detail.url, e.detail.mediaType, e.detail.file);
    };
    window.addEventListener('web:addtab', addTabHandler);

    WM.create({
      appId: 'web', title: 'Web', icon: '🌐', width: 850, height: 600,
      content: wrap,
      onClose: () => {
        window.removeEventListener('web:addtab', addTabHandler);
        // Revoke blob URLs for all media tabs
        tabs.forEach(t => {
          if (t.mediaUrl.startsWith('blob:')) URL.revokeObjectURL(t.mediaUrl);
        });
      }
    });
  }
});

  id:'imageviewer', name:'Image Viewer', icon:'🖼️',
  launch({ file, url, name: fname, revokeOnClose } = {}) {
    const displayName = fname || (file?.split('/').pop()) || 'Image';
    let zoom = 1, panX = 0, panY = 0, fitZoom = 1;
    let isPanning = false, px0 = 0, py0 = 0, tx0 = 0, ty0 = 0;
    let transitionEnabled = true;

    const wrap   = document.createElement('div'); wrap.className = 'img-viewer';
    const tb     = document.createElement('div'); tb.className   = 'media-toolbar';
    const btnOut = document.createElement('button'); btnOut.className='media-tb-btn'; btnOut.textContent='−';    btnOut.title='Zoom out  (scroll)';
    const zLbl   = document.createElement('span');   zLbl.style.cssText='font-size:.7rem;color:var(--text-dim);min-width:40px;text-align:center;font-family:var(--font-mono);flex-shrink:0';
    const btnIn  = document.createElement('button'); btnIn.className='media-tb-btn';  btnIn.textContent='＋';   btnIn.title='Zoom in  (scroll)';
    const sep    = document.createElement('div');    sep.className='media-tb-sep';
    const btnFit = document.createElement('button'); btnFit.className='media-tb-btn'; btnFit.textContent='Fit'; btnFit.title='Fit to window';
    const btn1x  = document.createElement('button'); btn1x.className='media-tb-btn';  btn1x.textContent='1:1'; btn1x.title='Actual size';
    const info   = document.createElement('span');   info.className='media-tb-info';  info.textContent=displayName;
    tb.append(btnOut, zLbl, btnIn, sep, btnFit, btn1x, info);

    const canvas = document.createElement('div'); canvas.className='img-canvas';
    const img    = document.createElement('img'); img.alt = displayName;
    canvas.appendChild(img);

    const statusBar = document.createElement('div'); statusBar.className='media-status'; statusBar.textContent='Loading…';
    wrap.append(tb, canvas, statusBar);

    function applyTransform(animate = true) {
      img.style.transition = animate ? 'transform .15s ease' : 'none';
      img.style.transform  = `scale(${zoom}) translate(${panX/zoom}px,${panY/zoom}px)`;
      zLbl.textContent     = Math.round(zoom * 100) + '%';
      // Swap between PrecisionSelect (fit/inspect) and Move (pannable) cursors
      canvas.classList.toggle('can-pan', zoom > fitZoom + 0.005);
    }

    function clampPan() {
      if (zoom <= fitZoom + 0.005) { panX = 0; panY = 0; }
    }

    function setZoom(z, cx = 0, cy = 0) {
      const prev = zoom;
      zoom = Math.max(0.05, Math.min(24, z));
      // Zoom toward cursor position
      panX = panX * (zoom / prev) + cx * (zoom / prev - 1) * (prev / zoom);
      panY = panY * (zoom / prev) + cy * (zoom / prev - 1) * (prev / zoom);
      clampPan(); applyTransform();
    }

    img.onload = () => {
      const cw = canvas.clientWidth || 660, ch = canvas.clientHeight || 380;
      fitZoom = Math.min(1, (cw - 24) / img.naturalWidth, (ch - 24) / img.naturalHeight);
      zoom = fitZoom; panX = 0; panY = 0; applyTransform(false);
      const kb = Math.round(img.src.length * 0.75 / 1024);
      statusBar.textContent = `${img.naturalWidth} × ${img.naturalHeight} px  ·  ${displayName}${kb ? '  ·  ~'+kb+'KB' : ''}  ·  double-click to toggle fit/actual`;
    };
    img.onerror = () => statusBar.textContent = '⚠️ Could not load image.';
    img.src = url;

    // Controls
    btnOut.addEventListener('click', () => setZoom(zoom / 1.35));
    btnIn.addEventListener('click',  () => setZoom(zoom * 1.35));
    btnFit.addEventListener('click', () => { zoom=fitZoom; panX=0; panY=0; applyTransform(); });
    btn1x.addEventListener('click',  () => { zoom=1;       panX=0; panY=0; applyTransform(); });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left - rect.width/2;
      const cy = e.clientY - rect.top  - rect.height/2;
      setZoom(zoom * (e.deltaY < 0 ? 1.12 : 0.89), cx, cy);
    }, { passive: false });

    canvas.addEventListener('dblclick', () => {
      if (zoom <= fitZoom + 0.005) { zoom=1; } else { zoom=fitZoom; panX=0; panY=0; }
      applyTransform();
    });

    // Pan
    canvas.addEventListener('mousedown', e => {
      if (zoom <= fitZoom + 0.005) return;
      isPanning=true; canvas.classList.add('panning');
      px0=e.clientX; py0=e.clientY; tx0=panX; ty0=panY; e.preventDefault();
    });
    const onPanMove = e => {
      if (!isPanning) return;
      panX = tx0 + (e.clientX - px0);
      panY = ty0 + (e.clientY - py0);
      applyTransform(false);
    };
    const onPanEnd = () => { if(isPanning){ isPanning=false; canvas.classList.remove('panning'); } };
    document.addEventListener('mousemove', onPanMove);
    document.addEventListener('mouseup', onPanEnd);

    WM.create({ appId:'imageviewer', title: displayName, icon:'🖼️', width:720, height:540, content: wrap,
      onClose: () => {
        document.removeEventListener('mousemove', onPanMove);
        document.removeEventListener('mouseup', onPanEnd);
        if (revokeOnClose && url?.startsWith('blob:')) URL.revokeObjectURL(url);
      }
    });
  }
});

/* ── VIDEO PLAYER ─────────────────────────────────────── */
AppRegistry.register({
  id:'videoplayer', name:'Video Player', icon:'🎬',
  launch({ file, url, name: fname, revokeOnClose } = {}) {
    const displayName = fname || (file?.split('/').pop()) || 'Video';

    const wrap  = document.createElement('div'); wrap.className='vid-player';
    const hdr   = document.createElement('div'); hdr.className='media-toolbar';
    const hinfo = document.createElement('span'); hinfo.className='media-tb-info'; hinfo.textContent='🎬  ' + displayName;
    hdr.appendChild(hinfo);

    const video = document.createElement('video');
    video.controls = true; video.autoplay = true;
    video.src = url;
    video.addEventListener('loadedmetadata', () => {
      const d = video.duration;
      const m = Math.floor(d/60), s = Math.floor(d%60);
      hinfo.textContent = `🎬  ${displayName}  ·  ${video.videoWidth}×${video.videoHeight}  ·  ${m}:${String(s).padStart(2,'0')}`;
    });
    wrap.append(hdr, video);

    WM.create({ appId:'videoplayer', title: displayName, icon:'🎬', width:680, height:460, content: wrap,
      onClose: () => { video.pause(); video.src=''; if (revokeOnClose && url?.startsWith('blob:')) URL.revokeObjectURL(url); }
    });
  }
});

/* ── AUDIO PLAYER ─────────────────────────────────────── */
AppRegistry.register({
  id:'audioplayer', name:'Audio Player', icon:'🎵',
  launch({ file, url, name: fname, revokeOnClose } = {}) {
    const displayName = fname || (file?.split('/').pop()) || 'Audio';
    const folder      = file?.split('/').slice(0, -1).pop() || '';

    const wrap    = document.createElement('div'); wrap.className='audio-player-app';
    const disc    = document.createElement('div'); disc.className='ap-disc'; disc.textContent='🎵';
    const title   = document.createElement('div'); title.className='ap-title';    title.textContent=displayName;
    const sub     = document.createElement('div'); sub.className='ap-subtitle';   sub.textContent=folder;
    const ctrlWrap= document.createElement('div'); ctrlWrap.className='ap-controls';
    const audio   = document.createElement('audio'); audio.controls=true; audio.src=url;
    ctrlWrap.appendChild(audio);
    const meta    = document.createElement('div'); meta.className='ap-meta'; meta.textContent='Loading…';
    wrap.append(disc, title, sub, ctrlWrap, meta);

    audio.addEventListener('loadedmetadata', () => {
      const d = audio.duration;
      const m = Math.floor(d/60), s = Math.floor(d%60);
      meta.textContent = `Duration: ${m}:${String(s).padStart(2,'0')}`;
    });
    audio.addEventListener('play',  () => disc.classList.add('playing'));
    audio.addEventListener('pause', () => disc.classList.remove('playing'));
    audio.addEventListener('ended', () => disc.classList.remove('playing'));
    audio.play().catch(() => {});   // autoplay (may be silently ignored by browser policy)

    WM.create({ appId:'audioplayer', title: displayName, icon:'🎵', width:340, height:330, content: wrap,
      minWidth:300, minHeight:270,
      onClose: () => { audio.pause(); audio.src=''; if (revokeOnClose && url?.startsWith('blob:')) URL.revokeObjectURL(url); }
    });
  }
});

// ─────────────────────────────────────────────────────────
// USER SETUP SCREEN
// ─────────────────────────────────────────────────────────
function buildUserSetupScreen(onDone) {
  const overlay = document.getElementById('mount-setup');
  const doneBtn = document.getElementById('msc-done');
  const nameInp = document.getElementById('msc-username-input');

  // Focus input automatically
  setTimeout(() => nameInp.focus(), 500);

  function finish() {
    const username = nameInp.value.trim() || 'user';
    
    // Persistence
    localStorage.setItem('teatree-username', username);
    localStorage.setItem('teatree-setup-done', '1');
    
    // Update live OS meta
    OS_META.user = username;
    
    overlay.classList.add('hidden');
    onDone();
  }

  doneBtn.addEventListener('click', finish);
  nameInp.addEventListener('keydown', e => { if(e.key === 'Enter') finish(); });

  overlay.classList.remove('hidden');
}

// ─────────────────────────────────────────────────────────
// BOOT SEQUENCE
// ─────────────────────────────────────────────────────────
const BOOT_MESSAGES = [
  'Loading kernel modules…',
  'Mounting filesystems…',
  'Starting network services…',
  'Initializing window manager…',
  'Loading user profile…',
  'Starting desktop environment…',
  'Welcome to TeaTreeOS Canopy.',
];

async function boot() {
  const bar = document.getElementById('boot-bar');
  const msg = document.getElementById('boot-msg');
  
  for (let i = 0; i < BOOT_MESSAGES.length; i++) {
    await new Promise(r => setTimeout(r, 200 + Math.random() * 100));
    msg.textContent   = BOOT_MESSAGES[i];
    bar.style.width   = `${Math.round(((i + 1) / BOOT_MESSAGES.length) * 100)}%`;
  }

  document.getElementById('boot').classList.add('hidden');
  document.getElementById('os').style.display = 'flex';

  // Initialize Drive system in background
  const mountCount = await MountManager.init();

  const setupDone = localStorage.getItem('teatree-setup-done');
  if (!setupDone) {
    buildUserSetupScreen(() => init(mountCount));
  } else {
    init(mountCount);
  }
}

function init(mountCount = 0) {
  buildDesktopIcons();
  bindDesktopContext();
  buildLauncher();
  startClock();
  const driveMsg = mountCount > 0 ? ` ${mountCount} drive${mountCount>1?'s':''} mounted.` : '';
  Notify.send('TeaTreeOS Ready', `Welcome, ${OS_META.user}. Canopy is running.${driveMsg}`);
}

// Close launcher on window manager interaction
document.addEventListener('mousedown', e=>{
  const lnch=document.getElementById('launcher');
  if(!lnch.classList.contains('hidden')&&!lnch.contains(e.target)&&e.target.id!=='menu-btn')
    lnch.classList.add('hidden');
});

// ─────────────────────────────────────────────────────────
// START
// ─────────────────────────────────────────────────────────
boot();
</script>
