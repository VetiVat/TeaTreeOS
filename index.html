<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeaTreeOS 1.2 Canopy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Sora:wght@300;400;500;600;700&display=swap">
<style>
/* ─── TOKENS ──────────────────────────────────────────────── */
:root {
  --base:        #080e08;
  --surface-0:   #0d150d;
  --surface-1:   #141f12;
  --surface-2:   #1c2b18;
  --surface-3:   #253820;
  --accent:      #6dbf67;
  --accent-dim:  rgba(109,191,103,.15);
  --accent-glow: rgba(109,191,103,.35);
  --green:       #86c87a;
  --yellow:      #d4a843;
  --red:         #e06b5a;
  --text:        #dde8d4;
  --text-muted:  #5a7050;
  --text-dim:    #8aaa7a;
  --border:      rgba(255,255,255,.07);
  --glass:       rgba(13,21,13,.84);
  --glass-light: rgba(28,43,24,.78);
  --radius:      10px;
  --radius-sm:   6px;
  --font-ui:     'Sora', sans-serif;
  --font-mono:   'JetBrains Mono', monospace;
  --taskbar-h:   44px;
  --shadow:      0 8px 32px rgba(0,0,0,.55);
  --shadow-lg:   0 16px 64px rgba(0,0,0,.7);
}

/* ─── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--base); }
body { font-family: var(--font-ui); color: var(--text); user-select: none; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
input, textarea { font: inherit; color: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

/* ─── BOOT SCREEN ─────────────────────────────────────────── */
#boot {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--base);
  transition: opacity .6s ease, visibility .6s;
}
#boot.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
#boot-logo {
  font-size: 3.5rem; font-weight: 700; letter-spacing: .12em;
  background: linear-gradient(135deg, var(--accent), #a3b87a 70%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 2.5rem;
  animation: fadeUp .8s ease both;
}
#boot-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--surface-2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 1.2rem;
}
#boot-msg {
  font-family: var(--font-mono); font-size: .75rem; color: var(--text-muted);
  letter-spacing: .08em;
  animation: fadeUp .8s .2s ease both;
}
#boot-progress {
  width: 180px; height: 2px; background: var(--surface-2);
  border-radius: 2px; margin-top: .9rem; overflow: hidden;
}
#boot-bar {
  height: 100%; background: var(--accent); border-radius: 2px; width: 0%;
  transition: width .3s ease;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

/* ─── OS ROOT ─────────────────────────────────────────────── */
#os {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}
#desktop {
  flex: 1; 
  position: relative; 
  overflow: hidden;
  /* Layering: The gradients stay on top to give it that "TeaTree" tint, image goes at the bottom */
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(109,191,103,.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 70%, rgba(74,108,44,.2) 0%, transparent 55%),
    url('assets/leaf.png'); 
  
  /* Settings to make the image behave like a wallpaper */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-color: #071007; /* Fallback color */
  
  animation: wallAnim 12s ease-in-out infinite alternate;
}

/* Subtle grid overlay */
#desktop::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(109,191,103,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(109,191,103,.025) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ─── DESKTOP ICONS ───────────────────────────────────────── */
#desktop-icons {
  position: absolute; top: 16px; left: 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.desk-icon {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  width: 72px; padding: 8px 4px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background .15s;
}
.desk-icon:hover { background: rgba(255,255,255,.07); }
.desk-icon:active { background: rgba(109,191,103,.12); }
.desk-icon .icon-img {
  width: 40px; height: 40px; font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.4));
}
.desk-icon .icon-label {
  font-size: .65rem; font-weight: 500; text-align: center;
  color: var(--text); text-shadow: 0 1px 4px rgba(0,0,0,.8);
  word-break: break-word; line-height: 1.3;
}

/* ─── WINDOW LAYER ────────────────────────────────────────── */
#window-layer { position: absolute; inset: 0 0 var(--taskbar-h) 0; pointer-events: none; }

/* ─── WINDOWS ─────────────────────────────────────────────── */
.window {
  position: absolute;
  min-width: 320px; min-height: 200px;
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.06);
  display: flex; flex-direction: column;
  pointer-events: all;
  transition: box-shadow .15s, opacity .2s, transform .2s;
  overflow: hidden;
}
.window.focused {
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(109,191,103,.2), inset 0 1px 0 rgba(255,255,255,.08);
}
.window.minimized { opacity: 0; transform: scale(.85) translateY(30px); pointer-events: none; }
.window.maximized {
  top: 0 !important; left: 0 !important;
  width: 100% !important; height: 100% !important;
  border-radius: 0; border: none;
}
.window.shaking { animation: shake .3s ease; }
@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
}
.win-spawn { animation: winSpawn .18s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes winSpawn {
  from { opacity:0; transform: scale(.9) translateY(8px); }
  to   { opacity:1; transform: none; }
}

/* ─── TITLEBAR ────────────────────────────────────────────── */
.window-titlebar {
  display: flex; align-items: center; gap: 10px;
  padding: 0 12px; height: 38px; flex-shrink: 0;
  background: rgba(255,255,255,.03);
  border-bottom: 1px solid var(--border);
  cursor: grab;
}
.window-titlebar:active { cursor: grabbing; }
.win-controls { display: flex; gap: 7px; flex-shrink: 0; }
.wc {
  width: 12px; height: 12px; border-radius: 50%;
  border: none; transition: filter .15s, transform .1s;
  position: relative; flex-shrink: 0;
}
.wc:hover { filter: brightness(1.25); transform: scale(1.1); }
.wc-close { background: var(--red); }
.wc-min   { background: var(--yellow); }
.wc-max   { background: var(--green); }
.win-title {
  flex: 1; text-align: center;
  font-size: .78rem; font-weight: 500; color: var(--text-dim);
  pointer-events: none; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.win-icon { font-size: 14px; pointer-events: none; flex-shrink: 0; }

/* ─── WINDOW BODY ─────────────────────────────────────────── */
.window-body {
  flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column;
}

/* ─── RESIZE HANDLE ───────────────────────────────────────── */
.win-resize {
  position: absolute; bottom: 0; right: 0;
  width: 16px; height: 16px; cursor: se-resize;
  z-index: 10;
}
.win-resize::after {
  content: '';
  position: absolute; bottom: 3px; right: 3px;
  width: 8px; height: 8px;
  border-right: 2px solid rgba(255,255,255,.2);
  border-bottom: 2px solid rgba(255,255,255,.2);
}

/* ─── TASKBAR ─────────────────────────────────────────────── */
#taskbar {
  height: var(--taskbar-h); flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px;
  background: var(--glass);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border-top: 1px solid var(--border);
  z-index: 1000;
}
#menu-btn {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  background: var(--accent-dim);
  color: var(--accent);
  transition: background .15s, transform .1s;
}
#menu-btn:hover { background: rgba(109,191,103,.25); transform: scale(1.05); }
#menu-btn.active { background: rgba(109,191,103,.3); }
#taskbar-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
#taskbar-wins { display: flex; align-items: center; gap: 4px; flex: 1; overflow: hidden; }
.tb-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px; height: 30px; border-radius: var(--radius-sm);
  font-size: .73rem; font-weight: 500; max-width: 160px;
  background: var(--surface-1); border: 1px solid var(--border);
  transition: background .15s;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  flex-shrink: 0;
}
.tb-btn:hover { background: var(--surface-2); }
.tb-btn.active { background: var(--surface-2); border-color: rgba(109,191,103,.3); color: var(--accent); }
.tb-btn-icon { font-size: 12px; flex-shrink: 0; }
#tray {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  margin-left: auto; padding-left: 10px;
}
#tray-icons { display: flex; gap: 8px; align-items: center; font-size: 13px; color: var(--text-dim); }
#clock {
  font-family: var(--font-mono); font-size: .72rem; font-weight: 500;
  color: var(--text-dim); white-space: nowrap;
}

/* ─── APP LAUNCHER ────────────────────────────────────────── */
#launcher {
  position: fixed; bottom: calc(var(--taskbar-h) + 8px); left: 8px;
  width: 320px;
  background: var(--glass);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  z-index: 900; padding: 14px;
  transition: opacity .18s, transform .18s, visibility .18s;
  transform-origin: bottom left;
}
#launcher.hidden { opacity: 0; transform: scale(.95) translateY(8px); visibility: hidden; pointer-events: none; }
#launcher-search {
  margin-bottom: 12px;
}
#launcher-search input {
  width: 100%; padding: 7px 12px; border-radius: var(--radius-sm);
  background: var(--surface-1); border: 1px solid var(--border);
  outline: none; font-size: .8rem; color: var(--text);
  transition: border-color .15s;
}
#launcher-search input:focus { border-color: rgba(109,191,103,.4); }
#launcher-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.lnch-item {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 8px 4px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background .15s;
}
.lnch-item:hover { background: rgba(255,255,255,.07); }
.lnch-item .l-icon { font-size: 26px; }
.lnch-item .l-name { font-size: .6rem; text-align: center; color: var(--text-dim); line-height: 1.3; }

/* ─── CONTEXT MENU ────────────────────────────────────────── */
#ctx-menu {
  position: fixed; z-index: 8000;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
  padding: 4px; min-width: 180px;
  transition: opacity .1s, transform .1s;
  transform-origin: top left;
}
#ctx-menu.hidden { opacity: 0; transform: scale(.95); pointer-events: none; }
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 12px; border-radius: 4px; font-size: .8rem;
  cursor: pointer; transition: background .1s; color: var(--text-dim);
}
.ctx-item:hover { background: rgba(255,255,255,.08); color: var(--text); }
.ctx-item.danger:hover { background: rgba(248,113,113,.12); color: var(--red); }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }
.ctx-icon { font-size: 13px; width: 16px; text-align: center; flex-shrink: 0; }

/* ─── NOTIFICATIONS ───────────────────────────────────────── */
#notifications {
  position: fixed; top: 12px; right: 12px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 9000; pointer-events: none;
}
.notif {
  background: var(--glass-light);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 10px 14px; min-width: 220px; max-width: 300px;
  box-shadow: var(--shadow);
  pointer-events: all;
  animation: notifIn .25s ease both;
}
.notif.out { animation: notifOut .25s ease forwards; }
.notif.warn { border-left-color: var(--yellow); }
.notif.error { border-left-color: var(--red); }
.notif-title { font-size: .75rem; font-weight: 600; margin-bottom: 3px; }
.notif-msg { font-size: .7rem; color: var(--text-dim); line-height: 1.4; }
@keyframes notifIn  { from { opacity:0; transform:translateX(20px); } }
@keyframes notifOut { to   { opacity:0; transform:translateX(20px); } }

/* ─── TERMINAL APP ────────────────────────────────────────── */
.terminal {
  flex: 1; display: flex; flex-direction: column;
  background: rgba(4,9,4,.92); font-family: var(--font-mono); overflow: hidden;
}
.term-output {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  font-size: .78rem; line-height: 1.7; white-space: pre-wrap; word-break: break-all;
}
.term-output .line-out   { color: #cbd5e1; }
.term-output .line-err   { color: var(--red); }
.term-output .line-info  { color: var(--accent); }
.term-output .line-sys   { color: var(--text-muted); font-style: italic; }
.term-output .line-ascii { color: var(--accent); line-height: 1.2; }
.term-input-row {
  display: flex; align-items: center; padding: 6px 14px 10px;
  border-top: 1px solid rgba(255,255,255,.04);
  flex-shrink: 0;
}
.term-prompt { color: var(--green); font-size: .78rem; white-space: nowrap; margin-right: 6px; }
.term-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--font-mono); font-size: .78rem; color: var(--text);
  caret-color: var(--accent);
}

/* ─── FILE MANAGER ────────────────────────────────────────── */
.fm-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.fm-toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.fm-path-bar {
  flex: 1; background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 4px 10px;
  font-family: var(--font-mono); font-size: .72rem; color: var(--text-dim);
}
.fm-btn-sm {
  width: 26px; height: 26px; border-radius: var(--radius-sm);
  background: var(--surface-1); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  transition: background .15s; flex-shrink: 0;
}
.fm-btn-sm:hover { background: var(--surface-2); }
.fm-list { flex: 1; overflow-y: auto; padding: 6px; }
.fm-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background .1s; font-size: .8rem;
}
.fm-item:hover { background: rgba(255,255,255,.05); }
.fm-item.selected { background: var(--accent-dim); }
.fm-item-icon { font-size: 16px; flex-shrink: 0; }
.fm-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fm-item-type { font-size: .68rem; color: var(--text-muted); flex-shrink: 0; }
.fm-status { padding: 5px 12px; border-top: 1px solid var(--border); font-size: .68rem; color: var(--text-muted); flex-shrink: 0; }

/* ─── TEXT EDITOR ─────────────────────────────────────────── */
.editor-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.editor-btn {
  padding: 3px 10px; border-radius: var(--radius-sm); font-size: .72rem;
  background: var(--surface-1); border: 1px solid var(--border);
  transition: background .15s; color: var(--text-dim);
}
.editor-btn:hover { background: var(--surface-2); color: var(--text); }
.editor-btn.primary { background: var(--accent-dim); border-color: rgba(109,191,103,.3); color: var(--accent); }
.editor-filename { font-size: .72rem; color: var(--text-muted); font-family: var(--font-mono); }
.editor-textarea {
  flex: 1; resize: none; border: none; outline: none;
  background: rgba(4,9,4,.6); color: var(--text);
  font-family: var(--font-mono); font-size: .8rem;
  padding: 12px 14px; line-height: 1.7;
}
.editor-status {
  padding: 4px 12px; border-top: 1px solid var(--border);
  font-size: .65rem; color: var(--text-muted); font-family: var(--font-mono); flex-shrink: 0;
}

/* ─── SYSTEM INFO ─────────────────────────────────────────── */
.sysinfo { flex: 1; overflow-y: auto; padding: 20px 24px; }
.si-logo {
  font-size: 2.2rem; font-weight: 700; letter-spacing: .08em;
  background: linear-gradient(135deg, var(--accent), #a3b87a);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.si-sub { font-size: .78rem; color: var(--text-muted); margin-bottom: 20px; }
.si-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.si-card {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
}
.si-card-label { font-size: .65rem; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
.si-card-value { font-size: .82rem; font-weight: 500; }
.si-card-sub { font-size: .68rem; color: var(--text-muted); margin-top: 2px; }

/* ─── UTILS ───────────────────────────────────────────────── */
.hidden { display: none !important; }
.flex-1 { flex: 1; }

/* ─── OS DIALOG ───────────────────────────────────────────── */
#os-dialog-overlay {
  position: fixed; inset: 0; z-index: 8500;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  transition: opacity .2s, visibility .2s;
}
#os-dialog-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }
#os-dialog {
  background: var(--glass);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid var(--border);
  border-top: 1px solid rgba(255,255,255,.12);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(109,191,103,.08);
  padding: 26px 28px 22px;
  min-width: 340px; max-width: 440px;
  animation: winSpawn .18s cubic-bezier(.34,1.56,.64,1) both;
}
.dlg-icon  { font-size: 2.2rem; margin-bottom: 12px; line-height: 1; }
.dlg-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
.dlg-msg   { font-size: .8rem; color: var(--text-dim); line-height: 1.65; margin-bottom: 14px; }
.dlg-detail {
  font-family: var(--font-mono); font-size: .72rem; color: var(--accent);
  background: var(--surface-1); border: 1px solid rgba(109,191,103,.2);
  border-radius: var(--radius-sm); padding: 7px 12px; margin-bottom: 20px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.dlg-input {
  width: 100%; border: none; outline: none; background: transparent;
  color: var(--text); font-family: var(--font-mono); font-size: .78rem;
}
.dlg-actions { display: flex; gap: 8px; justify-content: flex-end; }
.dlg-btn {
  padding: 7px 18px; border-radius: var(--radius-sm); font-size: .78rem;
  font-weight: 500; border: 1px solid var(--border);
  background: var(--surface-1); color: var(--text-dim);
  transition: background .15s, color .15s;
}
.dlg-btn:hover { background: var(--surface-2); color: var(--text); }
.dlg-btn.primary {
  background: var(--accent-dim); border-color: rgba(109,191,103,.35);
  color: var(--accent);
}
.dlg-btn.primary:hover { background: rgba(109,191,103,.25); }

/* ─── MOUNT SETUP SCREEN ──────────────────────────────────── */
#mount-setup {
  position: fixed; inset: 0; z-index: 8400;
  background: rgba(4,9,4,.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  transition: opacity .3s, visibility .3s;
}
#mount-setup.hidden { opacity:0; visibility:hidden; pointer-events:none; }
#msc-card {
  background: var(--glass);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid var(--border);
  border-top: 1px solid rgba(255,255,255,.12);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  padding: 36px 38px 28px;
  width: 480px; max-width: calc(100vw - 40px);
  animation: winSpawn .22s cubic-bezier(.34,1.56,.64,1) both;
}
#msc-icon  { font-size: 3rem; margin-bottom: 14px; }
#msc-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; }
#msc-desc  { font-size: .82rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 22px; }
#msc-mounts { display: flex; flex-direction: column; gap: 7px; min-height: 0; margin-bottom: 20px; }
#msc-mounts:empty::after { content:'No folders mounted yet.'; font-size:.75rem; color:var(--text-muted); font-style:italic; }
.msc-mount-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  background: var(--surface-1); border: 1px solid var(--border);
  font-size: .8rem;
}
.msc-mount-icon { font-size: 16px; flex-shrink: 0; }
.msc-mount-info { flex: 1; overflow: hidden; }
.msc-mount-name { font-weight: 500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.msc-mount-path { font-size: .68rem; color: var(--accent); font-family: var(--font-mono); margin-top: 2px; }
.msc-mount-del  { font-size: 13px; color: var(--text-muted); padding: 3px 6px; border-radius: 4px; transition: color .15s, background .15s; flex-shrink: 0; }
.msc-mount-del:hover { color: var(--red); background: rgba(248,113,113,.1); }
#msc-actions { display: flex; gap: 10px; }
#msc-add {
  padding: 9px 18px; border-radius: var(--radius-sm); font-size: .8rem;
  background: var(--accent-dim); border: 1px solid rgba(109,191,103,.3); color: var(--accent);
  font-weight: 500; transition: background .15s;
}
#msc-add:hover { background: rgba(109,191,103,.25); }
#msc-done {
  padding: 9px 20px; border-radius: var(--radius-sm); font-size: .8rem; font-weight: 600;
  background: var(--accent); border: none; color: #000;
  transition: opacity .15s; margin-left: auto;
}
#msc-done:hover { opacity: .88; }
#msc-no-api {
  font-size: .72rem; color: var(--yellow); background: rgba(250,204,21,.08);
  border: 1px solid rgba(250,204,21,.2); border-radius: var(--radius-sm);
  padding: 8px 12px; margin-bottom: 14px; line-height: 1.5;
}

/* ─── FILES APP — SIDEBAR LAYOUT ──────────────────────────── */
.fm-body    { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.fm-split   { flex: 1; display: flex; overflow: hidden; }
.fm-sidebar {
  width: 140px; flex-shrink: 0; border-right: 1px solid var(--border);
  overflow-y: auto; padding: 6px 0; display: flex; flex-direction: column; gap: 2px;
}
.fm-sb-label {
  font-size: .6rem; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 8px 12px 3px; flex-shrink: 0;
}
.fm-sb-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px; cursor: pointer; border-radius: 0;
  font-size: .75rem; color: var(--text-dim); transition: background .1s;
  flex-shrink: 0;
}
.fm-sb-item:hover  { background: rgba(255,255,255,.05); color: var(--text); }
.fm-sb-item.active { background: var(--accent-dim); color: var(--accent); }
.fm-sb-item-icon   { font-size: 13px; flex-shrink: 0; }
.fm-sb-sep  { height: 1px; background: var(--border); margin: 4px 10px; flex-shrink: 0; }
.fm-main    { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.fm-list    { flex: 1; overflow-y: auto; padding: 6px; }
.fm-eject   { font-size: 11px; color: var(--text-muted); margin-left: auto; padding: 2px 4px; border-radius: 3px; opacity: 0; transition: opacity .15s, color .15s; }
.fm-sb-item:hover .fm-eject { opacity: 1; }
.fm-eject:hover { color: var(--red) !important; }

/* ─── DRAG & DROP ──────────────────────────────────────────── */
.fm-item[draggable="true"] { cursor: grab; }
.fm-item[draggable="true"]:active { cursor: grabbing; }
.fm-item.dragging { opacity: .35; background: var(--surface-1) !important; }
.fm-item.drag-over {
  background: var(--accent-dim) !important;
  outline: 2px dashed var(--accent); outline-offset: -2px;
}
.fm-sb-item.drag-over { background: var(--accent-dim) !important; color: var(--accent); }
.fm-list.drag-over { outline: 2px dashed rgba(109,191,103,.3); outline-offset: -4px; }

/* ─── USERNAME INPUT (setup screen) ────────────────────────── */
.msc-section-hdr {
  font-size: .62rem; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 7px;
}
.msc-text-input {
  width: 100%; padding: 8px 12px; border-radius: var(--radius-sm);
  background: var(--surface-1); border: 1px solid var(--border);
  outline: none; font-size: .85rem; color: var(--text);
  transition: border-color .15s;
}
.msc-text-input:focus { border-color: rgba(109,191,103,.45); }

/* ─── DRAG & DROP VISUALS ─────────────────────────────────── */
.fm-item[draggable] { cursor: grab; }
.fm-item.dragging   { opacity: .35; outline: 2px dashed rgba(109,191,103,.4); border-radius: var(--radius-sm); }
.fm-item.drag-over,
.fm-list.drag-over,
.fm-sb-item.drag-over {
  background: var(--accent-dim) !important;
  outline: 2px dashed var(--accent); outline-offset: -2px;
  border-radius: var(--radius-sm);
}

/* ─── IMAGE VIEWER ────────────────────────────────────────── */
.img-viewer { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#050905; }
.img-toolbar {
  display:flex; align-items:center; gap:6px; padding:6px 10px; flex-shrink:0;
  background:rgba(0,0,0,.4); border-bottom:1px solid var(--border);
}
.img-canvas-wrap {
  flex:1; overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center; cursor:grab;
}
.img-canvas-wrap:active { cursor:grabbing; }
.img-canvas-wrap img { max-width:100%; max-height:100%; object-fit:contain; display:block; user-select:none; transform-origin:center; }
.img-zoom-lbl { font-family:var(--font-mono); font-size:.68rem; color:var(--text-muted); min-width:38px; text-align:center; }
.img-name-lbl { flex:1; font-size:.72rem; color:var(--text-muted); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.img-loading  { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--text-muted); font-size:.8rem; pointer-events:none; }
.img-spinner  { width:28px; height:28px; border:2px solid var(--surface-2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }

/* ─── VIDEO PLAYER ────────────────────────────────────────── */
.video-wrap { flex:1; display:flex; flex-direction:column; background:#000; overflow:hidden; }
.video-wrap video { flex:1; width:100%; height:0; min-height:0; object-fit:contain; display:block; }

/* ─── AUDIO PLAYER ────────────────────────────────────────── */
.audio-wrap {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:28px 24px; gap:18px;
  background:radial-gradient(ellipse 80% 70% at 50% 40%, rgba(109,191,103,.06), transparent);
}
.audio-art {
  width:130px; height:130px; border-radius:16px; flex-shrink:0;
  background:var(--surface-2); border:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; box-shadow:0 8px 28px rgba(0,0,0,.4);
  transition: box-shadow .3s;
}
.audio-art.playing { box-shadow:0 8px 40px rgba(109,191,103,.25), 0 0 0 1px rgba(109,191,103,.2); }
.audio-art-icon { font-size:2.6rem; }
.eq-bars { display:flex; align-items:flex-end; gap:3px; height:20px; }
.eq-bar  { width:4px; border-radius:2px; background:var(--accent); height:4px; transition:height .08s; }
.audio-meta { text-align:center; }
.audio-title { font-size:.95rem; font-weight:600; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:240px; }
.audio-ext   { font-size:.68rem; color:var(--text-muted); font-family:var(--font-mono); }
.audio-ctrls { display:flex; flex-direction:column; align-items:center; width:100%; max-width:280px; gap:10px; }
.audio-seek  { width:100%; height:5px; background:var(--surface-2); border-radius:3px; cursor:pointer; position:relative; }
.audio-seek-fill { position:absolute; left:0; top:0; height:100%; background:var(--accent); border-radius:3px; pointer-events:none; transition:width .1s linear; }
.audio-time  { font-family:var(--font-mono); font-size:.65rem; color:var(--text-muted); }
.audio-btns  { display:flex; align-items:center; justify-content:center; gap:10px; }
.ap-play-btn {
  width:42px; height:42px; border-radius:50%; flex-shrink:0;
  background:var(--accent); color:#000; font-size:16px;
  display:flex; align-items:center; justify-content:center;
  transition:transform .1s, box-shadow .15s;
}
.ap-play-btn:hover { transform:scale(1.08); box-shadow:0 0 16px var(--accent-glow); }
.ap-skip-btn { font-size:16px; color:var(--text-muted); padding:6px; transition:color .15s; }
.ap-skip-btn:hover { color:var(--text); }
.audio-vol { display:flex; align-items:center; gap:8px; width:100%; }
.audio-vol span { font-size:13px; flex-shrink:0; }
.audio-vol input[type=range] { flex:1; accent-color:var(--accent); height:3px; }
/* ─── MEDIA VIEWERS ───────────────────────────────────────── */
/* shared */
.media-toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: var(--surface-0);
}
.media-tb-btn {
  padding: 3px 9px; border-radius: var(--radius-sm); font-size: .72rem;
  background: var(--surface-1); border: 1px solid var(--border);
  color: var(--text-dim); transition: background .15s; flex-shrink: 0;
}
.media-tb-btn:hover { background: var(--surface-2); color: var(--text); }
.media-tb-sep  { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
.media-tb-info { font-size: .7rem; color: var(--text-muted); font-family: var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.media-status  { padding: 4px 12px; border-top: 1px solid var(--border); font-size: .65rem; color: var(--text-muted); font-family: var(--font-mono); flex-shrink: 0; }

/* image viewer */
.img-viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #060a06; }
.img-canvas {
  flex: 1; overflow: hidden; position: relative;
  display: flex; align-items: center; justify-content: center; cursor: grab;
}
.img-canvas.panning { cursor: grabbing; }
.img-canvas img {
  max-width: 100%; max-height: 100%; object-fit: contain;
  transform-origin: center center; pointer-events: none; user-select: none;
  display: block; image-rendering: auto;
}
/* checkerboard for transparency */
.img-canvas::before {
  content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background-image: linear-gradient(45deg,#121a12 25%,transparent 25%),
    linear-gradient(-45deg,#121a12 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#121a12 75%),
    linear-gradient(-45deg,transparent 75%,#121a12 75%);
  background-size: 20px 20px; background-position: 0 0,0 10px,10px -10px,-10px 0;
  opacity: .35;
}
.img-canvas img { position: relative; z-index: 1; }

/* video player */
.vid-player { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
.vid-player video { flex: 1; width: 100%; min-height: 0; object-fit: contain; display: block; background: #000; }

/* audio player */
.audio-player-app {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 14px; padding: 28px 24px;
  background: radial-gradient(ellipse 80% 70% at 50% 40%, var(--surface-1) 0%, var(--base) 100%);
}
.ap-disc {
  width: 108px; height: 108px; border-radius: 50%;
  background: conic-gradient(var(--surface-3) 0deg, var(--surface-2) 360deg);
  border: 3px solid var(--surface-3);
  box-shadow: 0 0 0 8px rgba(109,191,103,.06), 0 8px 32px rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center; font-size: 3rem;
  animation: discSpin 4s linear infinite paused; flex-shrink: 0;
}
.ap-disc.playing { animation-play-state: running; }
@keyframes discSpin { to { transform: rotate(360deg); } }
.ap-title    { font-size: .9rem; font-weight: 600; text-align: center; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ap-subtitle { font-size: .72rem; color: var(--text-muted); text-align: center; }
.ap-controls { width: 100%; max-width: 300px; }
.ap-controls audio { width: 100%; }
.ap-meta { font-size: .65rem; color: var(--text-muted); font-family: var(--font-mono); }

/* file type icons in file manager */
.fm-item-icon.icon-img   { filter: hue-rotate(200deg); }
.fm-item-icon.icon-vid   { filter: hue-rotate(120deg); }
.fm-item-icon.icon-audio { filter: hue-rotate(300deg); }

/* ─── WEB APP ────────────────────────────────────────────── */

/* Tab Bar */
.web-tab-bar { 
  display: flex; align-items: flex-end; background: #0a0e0a; 
  padding: 8px 8px 0 8px; gap: 4px; border-bottom: 1px solid var(--border);
}
.web-tab {
  display: flex; align-items: center; gap: 8px; padding: 6px 12px;
  background: #141f12; border: 1px solid var(--border); border-bottom: none;
  border-top-left-radius: 6px; border-top-right-radius: 6px;

/* Media Skins */
.skin-yt { background: #0f0f0f; color: white; } /* YouTube */
.skin-sc { background: linear-gradient(180deg, #333, #000); } /* SoundCloud */
.skin-ig { background: #121213; } /* Imgur */

.web-media-container {

}
.web-fake-sidebar { width: 300px; display: flex; flex-direction: column; gap: 10px; opacity: 0.6; }
.web-media-meta { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }

/* ─── CHAT APP (MSN STYLE) ────────────────────────────────── */
.chat-body {

.chat-users {

.chat-user-item {

.u-online { 
  width: 6px; 
  height: 6px; 
  border-radius: 50%;

  box-shadow: 0 0 5px var(--green);

.nudge-text {

  font-weight: 700;

/* ─── CURSORS ─────────────────────────────────────────────── */
/*
 * All cursor GIFs live at Cursors/<Name>.gif (relative to index.html).
 * Each rule provides a GIF url() first, then a CSS keyword fallback
 * for browsers that can't render animated cursors.
 *
 * Inventory:
 *   NormalSelect.gif       → default pointer
 *   LinkSelect.gif         → clickable item
 *   TextSelect2.gif        → text / caret
 *   Move.gif               → drag / grab / pan
 *   DiagonalResize1.gif    → SE ↔ NW resize  (↘)
 *   DiagonalResize2.gif    → SW ↔ NE resize  (↙)  [reserved]
 *   HorizontalResize.gif   → EW resize        (↔)  [reserved]
 *   VerticalResize.gif     → NS resize        (↕)  [reserved]
 *   Busy.gif               → wait / spinner
 *   WorkingInBackground.gif→ progress / background load
 *   PrecisionSelect.gif    → crosshair / precision
 *   HelpSelect.gif         → help / info tooltip
 *   Unavailable.gif        → not-allowed      [reserved]
 *   PersonSelect.gif       → user hover       [reserved]
 *   LocationSelect.gif     → location pick    [reserved]
 */

/* ── Base: everything inherits NormalSelect unless overridden ── */
*, *::before, *::after {
  cursor: url('Cursors/NormalSelect.gif'), default;
}

/* ── Clickable / interactive elements ─────────────────────── */
button,
.desk-icon,
.lnch-item,
.tb-btn,
.wc,
.ctx-item,
.notif,
.fm-sb-item,
.fm-eject,
.msc-mount-del,
#menu-btn,
#msc-add,
#msc-done,
.dlg-btn,
.editor-btn,
.media-tb-btn,
.ap-play-btn,
.ap-skip-btn,
.audio-seek,
.img-zoom-lbl {
  cursor: url('Cursors/LinkSelect.gif'), pointer;
}

/* ── Text editing / input ─────────────────────────────────── */
input[type="text"],
input:not([type]),

<script type="module">
'use strict';

// Import Firebase Modules
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, 
  serverTimestamp, where, getDocs, writeBatch 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  projectId: "teatreeoschat",
  storageBucket: "teatreeoschat.firebasestorage.app",

};

// Initialize Firebase & Firestore
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ╔═══════════════════════════════════════════════════════╗
// ║  TeaTreeOS — Core Systems                                 ║
// ║  Architecture:                                        ║
// ║    VFS → EventBus → AppRegistry → WindowManager       ║
// ║    ContextMenu → Notifications → Desktop → Taskbar    ║
// ╚═══════════════════════════════════════════════════════╝

const OS_META = { 
  name:'TeaTreeOS', 
  version:'1.5.0', 
  codename:'Canopy', 
  user: localStorage.getItem('teatree-username') || 'user', 
  hostname:'teatree-pc' 
};

function escapeHTML(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

// ─────────────────────────────────────────────────────────
// EVENT BUS  (decouple systems)
// ─────────────────────────────────────────────────────────
const EventBus = (() => {
  const h = {};
  return {
    on(ev, fn)    { (h[ev] = h[ev]||[]).push(fn); },
    off(ev, fn)   { if(h[ev]) h[ev] = h[ev].filter(f=>f!==fn); },
    emit(ev, ...a){ (h[ev]||[]).forEach(fn=>fn(...a)); }
  };
})();

// ─────────────────────────────────────────────────────────
// VIRTUAL FILE SYSTEM
// ─────────────────────────────────────────────────────────
const VFS = (() => {
  const tree = {
    type:'dir', children:{
      home:{ type:'dir', children:{
        user:{ type:'dir', children:{
          Desktop:   { type:'dir', children:{} },
          Documents: { type:'dir', children:{
            'readme.txt':{ type:'file', content:'Welcome to TeaTreeOS Canopy!\n\nThis is a simulated Linux-like environment.\nYou can use the Terminal to explore the file system.\n\nTry running: help\n\n~ The TeaTreeOS Team' }
          }},
          Downloads: { type:'dir', children:{} },
          Pictures:  { type:'dir', children:{} },
          '.bashrc':  { type:'file', content:'# TeaTreeOS user config\nexport PS1="\\u@\\h:\\w$ "\nexport PATH="/usr/bin:/bin"\nalias ll="ls -la"\nalias cls="clear"' }
        }}
      }},
      etc:{ type:'dir', children:{
        'os-release':{ type:'file', content:'NAME="TeaTreeOS"\nVERSION="1.2.0"\nID=teatree\nPRETTY_NAME="TeaTreeOS 1.2 (Canopy)"\nHOME_URL="https://teatreeos.local"' },
        'hostname':  { type:'file', content:'teatree-pc' },
        'passwd':    { type:'file', content:'root:x:0:0:root:/root:/bin/bash\nuser:x:1000:1000:user:/home/user:/bin/bash' }
      }},
      bin:    { type:'dir', children:{} },
      tmp:    { type:'dir', children:{} },
      var:    { type:'dir', children:{ log:{ type:'dir', children:{} } } }
    }
  };
  let cwd = '/home/user';

  function resolve(path) {
    if (!path || path === '~') return '/home/user';
    if (path.startsWith('~/'))   path = '/home/user' + path.slice(1);
    if (!path.startsWith('/'))   path = cwd.replace(/\/$/,'') + '/' + path;
    const parts = path.split('/').filter(Boolean);
    const out = [];
    for (const p of parts) { if(p==='.')continue; if(p==='..')out.pop(); else out.push(p); }
    return '/'+out.join('/');
  }
  function node(path) {
    const abs = resolve(path||cwd);
    if (abs === '/') return tree;
    const parts = abs.split('/').filter(Boolean);
    let n = tree;
    for (const p of parts) { if(!n.children||!n.children[p])return null; n=n.children[p]; }
    return n;
  }
  function parentOf(path) {
    const abs = resolve(path);
    const parts = abs.split('/').filter(Boolean);
    const name  = parts.pop();
    return { parent: node('/'+parts.join('/')), name };
  }

  return {
    getCwd: ()=>cwd,
    ls(path) {
      const n = node(path||cwd);
      if(!n)           return {error:`ls: cannot access '${path}': No such file or directory`};
      if(n.type==='file') return {files:[{name:path.split('/').pop(),type:'file'}]};
      return {files: Object.entries(n.children||{}).map(([k,v])=>({name:k,type:v.type}))};
    },
    cd(path) {
      const abs = resolve(path||'/home/user');
      const n   = node(abs);
      if(!n)           return {error:`cd: ${path}: No such file or directory`};
      if(n.type==='file') return {error:`cd: ${path}: Not a directory`};
      cwd = abs; return {};
    },
    cat(path) {
      const n = node(path);
      if(!n)           return {error:`cat: ${path}: No such file or directory`};
      if(n.type==='dir') return {error:`cat: ${path}: Is a directory`};
      return {content: n.content||''};
    },
    mkdir(path) {
      const {parent,name} = parentOf(path);
      if(!parent) return {error:`mkdir: cannot create '${path}': No such file or directory`};
      if(parent.type !== 'dir') return {error:`mkdir: cannot create '${path}': Not a directory`};
      if(parent.children[name]) return {error:`mkdir: cannot create '${path}': File exists`};
      parent.children[name] = {type:'dir',children:{}}; return {};
    },
    touch(path) {
      const {parent,name} = parentOf(path);
      if(!parent) return {error:`touch: cannot touch '${path}': No such file or directory`};
      if(parent.type !== 'dir') return {error:`touch: cannot touch '${path}': Not a directory`};
      if(!parent.children[name]) parent.children[name]={type:'file',content:''};
      return {};
    },
    rm(path, recursive=false) {
      const {parent,name} = parentOf(path);
      if(!parent||!parent.children[name]) return {error:`rm: cannot remove '${path}': No such file or directory`};
      const n = parent.children[name];
      if(n.type==='dir'&&!recursive&&Object.keys(n.children||{}).length)
        return {error:`rm: cannot remove '${path}': Is a directory (use -r)`};
      delete parent.children[name]; return {};
    },
    write(path, content) {
      const {parent,name} = parentOf(path);
      if(!parent) return {error:`No such file or directory`};
      if(parent.type !== 'dir') return {error:`Not a directory`};
      parent.children[name] = {type:'file',content}; return {};
    },
    // Move/rename a node within VFS by re-parenting the reference
    mv(srcPath, destDir) {
      const srcAbs  = resolve(srcPath);
      const srcParts= srcAbs.split('/').filter(Boolean);
      const srcName = srcParts.pop();
      const srcParent = node('/'+srcParts.join('/'));
      if (!srcParent || !srcParent.children[srcName]) return {error:`No such file: ${srcPath}`};
      const destAbs = resolve(destDir);
      if (srcParent.children[srcName].type === 'dir' && (destAbs === srcAbs || destAbs.startsWith(srcAbs + '/')))
        return {error:`Cannot move a directory into itself: ${srcPath}`};
      const destParent = node(destAbs);
      if (!destParent || destParent.type !== 'dir') return {error:`Destination not a directory: ${destDir}`};
      if (destParent.children[srcName]) return {error:`${srcName} already exists in destination`};
      destParent.children[srcName] = srcParent.children[srcName];
      delete srcParent.children[srcName];
      return {};
    },
    node,
    resolve
  };
})();

// ─────────────────────────────────────────────────────────
// WINDOW MANAGER
// ─────────────────────────────────────────────────────────
const WM = (() => {
  let wins = [], zTop = 100, idSeq = 0;
  const layer = ()=>document.getElementById('window-layer');

  function focus(id) {
    wins.forEach(w=>{
      const el = w.el;
      el.style.zIndex = (w.id===id) ? ++zTop : el.style.zIndex;
      el.classList.toggle('focused', w.id===id);
    });
    wins.forEach(w=>document.querySelector(`.tb-btn[data-wid="${w.id}"]`)
      ?.classList.toggle('active', w.id===id));
    EventBus.emit('wm:focus', id);
  }

  function create({appId, title, icon='🖥️', width=600, height=420, x, y, content, onClose, minWidth=280, minHeight=160}) {
    const id  = ++idSeq;
    const vw  = layer().clientWidth  || window.innerWidth;
    const vh  = layer().clientHeight || window.innerHeight - 44;
    const ox  = x  ?? Math.max(40, Math.min(vw*0.1 + (wins.length*28)%180, vw-width-60));
    const oy  = y  ?? Math.max(20, Math.min(vh*0.08+ (wins.length*22)%120, vh-height-60));

    const el = document.createElement('div');
    el.className = 'window win-spawn';
    el.dataset.wid = id;
    el.style.cssText = `width:${width}px;height:${height}px;top:${oy}px;left:${ox}px;z-index:${++zTop}`;
    el.innerHTML = `
      <div class="window-titlebar" data-wid="${id}">
        <div class="win-controls">
          <button class="wc wc-close" title="Close"   data-act="close"></button>
          <button class="wc wc-min"   title="Minimize" data-act="min"></button>
          <button class="wc wc-max"   title="Maximize" data-act="max"></button>
        </div>
        <span class="win-icon">${escapeHTML(icon)}</span>
        <span class="win-title">${escapeHTML(title)}</span>
      </div>
      <div class="window-body"></div>
      <div class="win-resize" data-wid="${id}"></div>`;

    const body = el.querySelector('.window-body');
    if (typeof content === 'string') body.innerHTML = content;
    else if (content instanceof Node) body.appendChild(content);

    layer().appendChild(el);
    el.addEventListener('mousedown', ()=>focus(id), true);
    const cleanup = [
      addDrag(el.querySelector('.window-titlebar'), el, id),
      addResize(el.querySelector('.win-resize'), el, id, minWidth, minHeight)
    ].filter(Boolean);
    wins.push({id, appId, el, minimized:false, maximized:false, onClose, title, icon, cleanup});
    el.querySelector('[data-act="close"]').addEventListener('click', ()=>close(id));
    el.querySelector('[data-act="min"]').addEventListener('click',   ()=>toggleMin(id));
    el.querySelector('[data-act="max"]').addEventListener('click',   ()=>toggleMax(id));
    focus(id);
    addTaskbarBtn(id, icon, title);
    EventBus.emit('wm:open', {id, appId});
    return id;
  }

  function close(id) {
    const w = wins.find(w=>w.id===id); if(!w) return;
    if(w.onClose) w.onClose();
    w.cleanup?.forEach(fn => fn());
    w.el.style.transition='opacity .15s,transform .15s';
    w.el.style.opacity='0'; w.el.style.transform='scale(.95)';
    setTimeout(()=>{ w.el.remove(); wins=wins.filter(x=>x.id!==id); removeTaskbarBtn(id); EventBus.emit('wm:close',id); },160);
  }

  function toggleMin(id) {
    const w = wins.find(w=>w.id===id); if(!w) return;
    w.minimized = !w.minimized;
    w.el.classList.toggle('minimized', w.minimized);
    const btn = document.querySelector(`.tb-btn[data-wid="${id}"]`);
    if(btn) btn.classList.toggle('active',!w.minimized);
    if(!w.minimized) focus(id);
  }

  function toggleMax(id) {
    const w = wins.find(w=>w.id===id); if(!w) return;
    if(!w.maximized) { w._prev={t:w.el.style.top,l:w.el.style.left,wd:w.el.style.width,ht:w.el.style.height}; }
    w.maximized = !w.maximized;
    w.el.classList.toggle('maximized', w.maximized);
    if(!w.maximized && w._prev) {
      w.el.style.top=w._prev.t; w.el.style.left=w._prev.l;
      w.el.style.width=w._prev.wd; w.el.style.height=w._prev.ht;
    }
  }

  function addDrag(handle, win, id) {
    let sx,sy,sl,st,dragging=false;
    handle.addEventListener('mousedown', e=>{
      const w=wins.find(w=>w.id===id);
      if(w?.maximized||e.target.classList.contains('wc'))return;
      dragging=true; sx=e.clientX; sy=e.clientY;
      sl=parseInt(win.style.left)||0; st=parseInt(win.style.top)||0;
      e.preventDefault();
    });
    const onMove = e=>{
      if(!dragging)return;
      win.style.left=Math.max(0,sl+(e.clientX-sx))+'px';
      win.style.top =Math.max(0,st+(e.clientY-sy))+'px';
    };
    const onUp = ()=>dragging=false;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
  }

  function addResize(handle, win, id, minW, minH) {
    let sx,sy,sw,sh,dragging=false;
    handle.addEventListener('mousedown', e=>{
      dragging=true; sx=e.clientX; sy=e.clientY;
      sw=win.offsetWidth; sh=win.offsetHeight; e.preventDefault(); e.stopPropagation();
    });
    const onMove = e=>{
      if(!dragging)return;
      win.style.width =Math.max(minW,sw+(e.clientX-sx))+'px';
      win.style.height=Math.max(minH,sh+(e.clientY-sy))+'px';
    };
    const onUp = ()=>dragging=false;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
  }

  function addTaskbarBtn(id, icon, title) {
    const c = document.getElementById('taskbar-wins');
    const b = document.createElement('button');
    b.className='tb-btn active'; b.dataset.wid=id;
    b.innerHTML=`<span class="tb-btn-icon">${escapeHTML(icon)}</span><span>${escapeHTML(title)}</span>`;
    b.addEventListener('click', ()=>{
      const w=wins.find(w=>w.id===id); if(!w)return;
      if (w.minimized) toggleMin(id);
      else if (!w.el.classList.contains('focused')) focus(id);
      else toggleMin(id);
    });
    c.appendChild(b);
  }
  function removeTaskbarBtn(id) {
    document.querySelector(`.tb-btn[data-wid="${id}"]`)?.remove();
  }

  return { create, close, toggleMin, toggleMax, focus, getWins:()=>[...wins] };
})();

// ─────────────────────────────────────────────────────────
// APP REGISTRY
// ─────────────────────────────────────────────────────────
const AppRegistry = (() => {
  const apps = {};
  return {
    register(def) { apps[def.id] = def; },
    launch(id, opts={}) {
      const def = apps[id]; if(!def){Notify.send('Error',`App '${id}' not found`,'error');return;}
      def.launch(opts);
    },
    getAll() { return Object.values(apps); },
    get(id)  { return apps[id]; }
  };
})();

// ─────────────────────────────────────────────────────────
// NOTIFICATION SERVICE
// ─────────────────────────────────────────────────────────
const Notify = (() => {
  const container = ()=>document.getElementById('notifications');
  return {
    send(title, msg='', type='info', duration=3800) {
      const el = document.createElement('div');
      el.className = `notif ${type}`;
      el.innerHTML = `<div class="notif-title">${escapeHTML(title)}</div>${msg?`<div class="notif-msg">${escapeHTML(msg)}</div>`:''}`;
      container().appendChild(el);
      const dismiss = ()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),250); };
      el.addEventListener('click', dismiss);
      setTimeout(dismiss, duration);
    }
  };
})();

// ─────────────────────────────────────────────────────────
// OS DIALOG  (native modal — no browser confirm/alert)
// Usage: Dialog.show({ icon, title, msg, detail, buttons })
//   buttons: [{ label, primary, action }]
// ─────────────────────────────────────────────────────────
const Dialog = (() => {
  function qs(id) { return document.getElementById(id); }
  let onDismiss = null;
  function hide(runDismiss = true) {
    qs('os-dialog-overlay').classList.add('hidden');
    if (runDismiss && onDismiss) { const fn = onDismiss; onDismiss = null; fn(); }
    if (!runDismiss) onDismiss = null;
  }

  // Wire backdrop click to close
  document.addEventListener('DOMContentLoaded', ()=>{}, false);
  // (overlay exists in DOM already since script runs after body parse)
  qs('os-dialog-overlay').addEventListener('click', e=>{
    if (e.target === qs('os-dialog-overlay')) hide();
  });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') hide(); });

  function show({ icon='💬', title='', msg='', detail=null, buttons=[] }) {
    onDismiss = null;
    qs('dlg-icon').textContent  = icon;
    qs('dlg-title').textContent = title;
    qs('dlg-msg').textContent   = msg;
    const det = qs('dlg-detail');
    if (detail) { det.textContent = detail; det.classList.remove('hidden'); }
    else          { det.classList.add('hidden'); }
    const acts = qs('dlg-actions'); acts.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'dlg-btn' + (b.primary ? ' primary' : '');
      btn.textContent = b.label;
      btn.addEventListener('click', () => { hide(false); b.action?.(); });
      acts.appendChild(btn);
    });
    qs('os-dialog-overlay').classList.remove('hidden');
    // Focus first primary button for keyboard UX
    setTimeout(()=>acts.querySelector('.primary')?.focus(), 60);
  }

  function promptInput({ icon='💬', title='', msg='', value='', placeholder='' } = {}) {
    return new Promise(resolve => {
      show({
        icon, title, msg,
        buttons: [
          { label:'OK', primary:true, action:() => resolve(input.value.trim()) },
          { label:'Cancel', action:() => resolve(null) }
        ]
      });
      onDismiss = () => resolve(null);
      const det = qs('dlg-detail');
      det.classList.remove('hidden');
      det.innerHTML = '';
      const input = document.createElement('input');
      input.className = 'dlg-input';
      input.type = 'text';
      input.value = value;
      input.placeholder = placeholder;
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { hide(false); resolve(input.value.trim()); }
      });
      det.appendChild(input);
      setTimeout(() => input.focus(), 60);
    });
  }

  function confirm({ icon='⚠️', title='', msg='' } = {}) {
    return new Promise(resolve => {
      show({
        icon, title, msg,
        buttons: [
          { label:'Continue', primary:true, action:() => resolve(true) },
          { label:'Cancel', action:() => resolve(false) }
        ]
      });
      onDismiss = () => resolve(false);
    });
  }

  return { show, hide, promptInput, confirm };
})();

// ─────────────────────────────────────────────────────────
// HOST FILESYSTEM BRIDGE
// Connects TeaTreeOS VFS ↔ the real browser/host filesystem.
//
//  exportFile(vfsPath, content)
//    → triggers a real browser download of the file as .txt
//    → simultaneously mirrors the file into /home/user/Downloads/
//      so NovOS can open/edit it without re-importing
//
//  importFile(targetVfsDir, onDone)
//    → opens a host file picker
//    → reads the chosen file as text
//    → writes it into the given VFS directory
//    → calls onDone({ name, path, content }) when complete
// ─────────────────────────────────────────────────────────
const HostFS = (() => {
  const DOWNLOADS_VFS = '/home/user/Downloads';

  function triggerBrowserDownload(filename, content) {
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  return {
    /**
     * Export a VFS file to the host machine.
     * @param {string} vfsPath  - Full VFS path of the file (e.g. '/home/user/notes.txt')
     * @param {string} content  - Text content to save
     */
    exportFile(vfsPath, content) {
      const name = vfsPath.split('/').pop();
      // 1. Mirror into VFS Downloads so it's immediately accessible in TeaTreeOS
      VFS.mkdir(DOWNLOADS_VFS);                       // safe no-op if already exists
      VFS.write(DOWNLOADS_VFS + '/' + name, content); // create or overwrite mirror
      // 2. Trigger actual host browser download
      triggerBrowserDownload(name, content);
      // 3. Inform user
      Notify.send(
        '📥 Exported to Host',
        `"${name}" downloaded to your browser's Downloads folder and mirrored to ${DOWNLOADS_VFS}/`,
        'info', 5500
      );
      EventBus.emit('hostfs:exported', { name, mirrorPath: DOWNLOADS_VFS + '/' + name });
    },

    /**
     * Import a host file into TeaTreeOS VFS via browser file picker.
     * Text files are stored as-is; binary media (images, video, audio)
     * are stored as base64 data URIs so TeaTreeOS can display them natively.
     * @param {string}   targetVfsDir - VFS directory to save into (defaults to Downloads)
     * @param {Function} onDone       - Called with { name, path, content } on success
     */
    importFile(targetVfsDir = DOWNLOADS_VFS, onDone) {
      const inp = document.createElement('input');
      inp.type    = 'file';
      inp.accept  = '.txt,.md,.sh,.json,.csv,.log,.conf,.cfg,.ini,.html,.css,.js,.ts,.py,.rb,.yaml,.toml,' +
                    '.jpg,.jpeg,.png,.gif,.webp,.svg,.bmp,.ico,.avif,' +
                    '.mp4,.webm,.mov,.ogv,' +
                    '.mp3,.wav,.ogg,.oga,.flac,.aac,.m4a,.opus';
      inp.style.display = 'none';
      document.body.appendChild(inp);

      inp.addEventListener('change', e => {
        const file = e.target.files[0];
        inp.remove();
        if (!file) return;
        const reader  = new FileReader();
        const isBinary = /\.(jpg|jpeg|png|gif|webp|svg|bmp|ico|avif|mp4|webm|mov|ogv|mp3|wav|ogg|oga|flac|aac|m4a|opus)$/i.test(file.name);
        reader.onload = ev => {
          const content = ev.target.result;   // text string  OR  data URI
          const dest    = targetVfsDir.replace(/\/$/, '') + '/' + file.name;
          VFS.mkdir(targetVfsDir);
          VFS.write(dest, content);
          Notify.send('📤 Imported from Host', `"${file.name}" → ${dest}`);
          EventBus.emit('hostfs:imported', { name: file.name, vfsPath: dest });
          onDone?.({ name: file.name, path: dest, content });
        };
        reader.onerror = () => Notify.send('Import Error', `Could not read "${file.name}"`, 'error');
        if (isBinary) reader.readAsDataURL(file);
        else          reader.readAsText(file);
      });

      inp.addEventListener('cancel', () => inp.remove());
      inp.click();
    }
  };
})();

// ─────────────────────────────────────────────────────────
// MOUNT MANAGER
// Persistent host-folder → TeaTreeOS drive mapping.
//
// Uses the File System Access API (showDirectoryPicker) for
// live read/write access to real host directories, and
// IndexedDB to persist FileSystemDirectoryHandles across
// page loads (handles are IDB-serialisable in Chromium).
//
// Mounted folders appear at /media/<folderName>/ in the VFS
// and are accessible through the Files app sidebar.
// ─────────────────────────────────────────────────────────
const MountManager = (() => {
  const IDB_NAME    = 'teatree-mounts-v1';
  const IDB_VER     = 1;
  const IDB_STORE   = 'mounts';
  const MEDIA_ROOT  = '/media';
  let   mounts      = [];   // [{ id, name, handle }]
  let   _db         = null;

  // ── IndexedDB wrapper ────────────────────────────────
  async function openDB() {
    if (_db) return _db;
    return new Promise((res, rej) => {
      const req = indexedDB.open(IDB_NAME, IDB_VER);
      req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE, { keyPath:'id' });
      req.onsuccess = e => { _db = e.target.result; res(_db); };
      req.onerror   = e => rej(e.target.error);
    });
  }
  async function idbAll()        { const d=await openDB(); return new Promise((r,j)=>{ const q=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).getAll(); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); }); }
  async function idbPut(rec)     { const d=await openDB(); return new Promise((r,j)=>{ const q=d.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(rec);  q.onsuccess=()=>r();       q.onerror=()=>j(q.error); }); }
  async function idbDel(id)      { const d=await openDB(); return new Promise((r,j)=>{ const q=d.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(id); q.onsuccess=()=>r();       q.onerror=()=>j(q.error); }); }

  // ── VFS stubs at /media/<name>/ ──────────────────────
  function vfsEnsure(name) { VFS.mkdir(MEDIA_ROOT); VFS.mkdir(MEDIA_ROOT+'/'+name); }
  function vfsRemove(name) { try { VFS.rm(MEDIA_ROOT+'/'+name, true); } catch(_){} }

  // ── Path resolution ───────────────────────────────────
  // Returns { mount, relativeParts[] } or null
  function resolvePath(absPath) {
    const norm = absPath.replace(/\/$/, '');
    for (const m of mounts) {
      const mp = MEDIA_ROOT + '/' + m.name;
      if (norm === mp || norm.startsWith(mp + '/')) {
        const rel = norm.slice(mp.length).replace(/^\//, '');
        return { mount: m, relativeParts: rel ? rel.split('/') : [] };
      }
    }
    return null;
  }

  // Walk handle tree down a list of dir-name parts
  async function walkDir(rootHandle, parts) {
    let h = rootHandle;
    for (const p of parts) h = await h.getDirectoryHandle(p, { create: false });
    return h;
  }

  // ── Public API ────────────────────────────────────────
  const api = {
    isSupported() { return 'showDirectoryPicker' in window; },
    isMountedPath(p) { return p === MEDIA_ROOT || p === MEDIA_ROOT+'/' || p.startsWith(MEDIA_ROOT+'/'); },
    getMounts() { return [...mounts]; },

    // Load saved handles from IDB and re-request permissions
    async init() {
      try {
        const stored = await idbAll();
        for (const rec of stored) {
          try {
            // Check/re-request readwrite permission (required after page reload)
            let perm = await rec.handle.queryPermission({ mode:'readwrite' });
            if (perm !== 'granted') perm = await rec.handle.requestPermission({ mode:'readwrite' });
            if (perm !== 'granted') { await idbDel(rec.id); continue; } // permission denied; forget it
            mounts.push({ id: rec.id, name: rec.name, handle: rec.handle });
            vfsEnsure(rec.name);
          } catch(e) { console.warn('Mount restore failed:', rec.name, e); await idbDel(rec.id); }
        }
      } catch(e) { console.warn('MountManager.init error', e); }
      EventBus.emit('mounts:changed', mounts);
      return mounts.length;
    },

    // Prompt the user to pick a host folder and mount it
    async pickAndMount() {
      if (!api.isSupported()) {
        Notify.send('Not Supported', 'File System Access API requires Chromium/Chrome 86+.', 'error', 6000);
        return null;
      }
      let handle;
      try { handle = await window.showDirectoryPicker({ mode: 'readwrite' }); }
      catch(e) { if (e.name !== 'AbortError') Notify.send('Mount Error', e.message, 'error'); return null; }
      // Deduplicate name if needed
      let name = handle.name, n = 2;
      while (mounts.find(m => m.name === name)) name = handle.name + String(n++);
      const id  = 'mnt-' + Date.now();
      const rec = { id, name, handle };
      mounts.push(rec); vfsEnsure(name);
      await idbPut(rec);
      EventBus.emit('mounts:changed', mounts);
      Notify.send('📂 Drive Mounted', `"${name}" → /media/${name}/`);
      return rec;
    },

    // Unmount a drive by id
    async unmount(id) {
      const m = mounts.find(x => x.id === id); if (!m) return;
      mounts = mounts.filter(x => x.id !== id);
      vfsRemove(m.name);
      await idbDel(id);
      EventBus.emit('mounts:changed', mounts);
      Notify.send('Drive Unmounted', `"${m.name}" has been removed.`, 'warn');
    },

    // ── Async filesystem operations ───────────────────────

    // List directory: returns [{ name, type:'file'|'dir' }]
    async ls(absPath) {
      if (api.isMountedPath(absPath) && !absPath.replace(MEDIA_ROOT,'').replace(/^\/$/,'').includes('/')) {
        // Listing /media itself — return mount point stubs
        return mounts.map(m => ({ name: m.name, type: 'dir' }));
      }
      const r = resolvePath(absPath); if (!r) return [];
      const dh = await walkDir(r.mount.handle, r.relativeParts);
      const out = [];
      for await (const [name, h] of dh) out.push({ name, type: h.kind === 'directory' ? 'dir' : 'file' });
      return out;
    },

    // Read a file as text
    async readFile(absPath) {
      const r = resolvePath(absPath);
      if (!r || !r.relativeParts.length) throw new Error('Not a file: ' + absPath);
      const parts = [...r.relativeParts], fname = parts.pop();
      const dh  = await walkDir(r.mount.handle, parts);
      const fh  = await dh.getFileHandle(fname);
      return await (await fh.getFile()).text();
    },

    // Read a file as a Blob URL — efficient for media (no base64 overhead).
    // IMPORTANT: caller must call URL.revokeObjectURL(result.url) when done.
    async readFileAsBlob(absPath) {
      const r = resolvePath(absPath);
      if (!r || !r.relativeParts.length) throw new Error('Not a file: ' + absPath);
      const parts = [...r.relativeParts], fname = parts.pop();
      const dh   = await walkDir(r.mount.handle, parts);
      const fh   = await dh.getFileHandle(fname);
      const file = await fh.getFile();
      return { url: URL.createObjectURL(file), mimeType: file.type, size: file.size, file };
    },

    // Write/create a file
    async writeFile(absPath, content) {
      const r = resolvePath(absPath);
      if (!r || !r.relativeParts.length) throw new Error('Not a file path: ' + absPath);
      const parts = [...r.relativeParts], fname = parts.pop();
      const dh = await walkDir(r.mount.handle, parts);
      const fh = await dh.getFileHandle(fname, { create: true });
      const w  = await fh.createWritable();
      await w.write(content); await w.close();
    },

    // Create a directory (recursive-safe)
    async mkdir(absPath) {
      const r = resolvePath(absPath);
      if (!r || !r.relativeParts.length) throw new Error('Invalid path: ' + absPath);
      const parts = [...r.relativeParts], dname = parts.pop();
      const parent = await walkDir(r.mount.handle, parts);
      await parent.getDirectoryHandle(dname, { create: true });
    },

    // Delete a file or directory (recursive)
    async rm(absPath) {
      const r = resolvePath(absPath);
      if (!r || !r.relativeParts.length) throw new Error('Cannot delete mount root');
      const parts = [...r.relativeParts], name = parts.pop();
      const parent = await walkDir(r.mount.handle, parts);
      await parent.removeEntry(name, { recursive: true });
    },

    // Rename (copy + delete, since FSAPI has no rename)
    async rename(absPath, newName) {
      const content = await api.readFile(absPath);
      const dir = absPath.split('/').slice(0, -1).join('/');
      await api.writeFile(dir + '/' + newName, content);
      await api.rm(absPath);
    }
  };

  return api;
})();

// ─────────────────────────────────────────────────────────
// DEFAULT SAVE PATH
// Returns the first mounted host drive when available so new
// files land directly on the real filesystem, otherwise falls
// back to the TeaTreeOS Documents folder.
// ─────────────────────────────────────────────────────────
function getDefaultSavePath() {
  const mounts = MountManager.getMounts();
  return mounts.length > 0
    ? '/media/' + mounts[0].name
    : '/home/user/Documents';
}

// ─────────────────────────────────────────────────────────
// FILE TYPE DETECTION
// Maps extensions → viewer category and display metadata.
// ─────────────────────────────────────────────────────────
const FILE_TYPES = {
  image: { exts: ['jpg','jpeg','png','gif','webp','svg','bmp','ico','avif'],  icon:'🖼️',  app:'imageviewer' },
  video: { exts: ['mp4','webm','ogg','ogv','mov','mkv'],                      icon:'🎬',  app:'videoplayer'  },
  audio: { exts: ['mp3','wav','oga','flac','aac','m4a','opus'],               icon:'🎵',  app:'audioplayer'  },
  text:  { exts: [],                                                           icon:'📄',  app:'editor'       },
};
// ogg is ambiguous (video container or audio) — handled at runtime by MIME type

function getFileType(filename) {
  const ext = (filename.split('.').pop() || '').toLowerCase();
  for (const [type, def] of Object.entries(FILE_TYPES)) {
    if (def.exts.includes(ext)) return type;
  }
  return 'text';
}

function fileIcon(filename, type) {
  // type already resolved — return emoji
  return FILE_TYPES[type]?.icon ?? '📄';
}

// Open a file with the right viewer, resolving blob URLs for host-drive files.
// Used by both the Files app dbl-click and the context menu "Open" action.
async function openFile(absPath, name) {
  const type = getFileType(name);
  
  // If it's text, use the standard editor
  if (type === 'text') {
    if (MountManager.isMountedPath(absPath)) {
      try {
        const content = await MountManager.readFile(absPath);
        AppRegistry.launch('editor', { file: absPath, preContent: content });
      } catch(e) { Notify.send('Read Error', e.message, 'error'); }
    } else {
      AppRegistry.launch('editor', { file: absPath });
    }
    return;
  }

  // Intercept Media: Audio, Video, and Images now open in "Web"
  let url, revoke = false;
  if (MountManager.isMountedPath(absPath)) {
    try {
      const blob = await MountManager.readFileAsBlob(absPath);
      url = blob.url; revoke = true;
    } catch(e) { Notify.send('Read Error', e.message, 'error'); return; }
  } else {
    const r = VFS.cat(absPath);
    if (r.error) { Notify.send('Error', r.error, 'error'); return; }
    url = r.content;
  }

  if (!url) { Notify.send('Cannot Open', 'No displayable content found.', 'warn'); return; }
  
  // Launch in the Web app instead of standalone viewers
  AppRegistry.launch('web', { 
    file: absPath, 
    url, 
    name, 
    mediaType: type,
    revokeOnClose: revoke 
  });
}

// CONTEXT MENU
// ─────────────────────────────────────────────────────────
const CtxMenu = (() => {
  const el = ()=>document.getElementById('ctx-menu');
  function hide() { el().classList.add('hidden'); }
  function show(x, y, items) {
    const m = el(); m.innerHTML='';
    items.forEach(item=>{
      if(item.sep){ const s=document.createElement('div'); s.className='ctx-sep'; m.appendChild(s); return; }
      const d=document.createElement('div');
      d.className='ctx-item'+(item.danger?' danger':'');
      d.innerHTML=`<span class="ctx-icon">${escapeHTML(item.icon||'•')}</span>${escapeHTML(item.label)}`;
      d.addEventListener('click',()=>{ hide(); item.action?.(); });
      m.appendChild(d);
    });
    m.classList.remove('hidden');
    const vw=window.innerWidth, vh=window.innerHeight;
    m.style.left=Math.min(x,vw-m.offsetWidth-8)+'px';
    m.style.top =Math.min(y,vh-m.offsetHeight-8)+'px';
  }
  document.addEventListener('click', hide);
  document.addEventListener('contextmenu', e=>{ if(e.target.closest('#ctx-menu'))return; hide(); });
  return {show, hide};
})();

// ─────────────────────────────────────────────────────────
// APP LAUNCHER MENU
// ─────────────────────────────────────────────────────────
function buildLauncher() {
  const grid   = document.getElementById('launcher-grid');
  const input  = document.getElementById('launcher-input');
  const lnch   = document.getElementById('launcher');
  const menuBtn= document.getElementById('menu-btn');

  function render(filter='') {
    grid.innerHTML='';
    const apps = AppRegistry.getAll().filter(a=>a.name.toLowerCase().includes(filter.toLowerCase()));
    apps.forEach(a=>{
      const d=document.createElement('div'); d.className='lnch-item';
      d.innerHTML=`<div class="l-icon">${escapeHTML(a.icon)}</div><div class="l-name">${escapeHTML(a.name)}</div>`;
      d.addEventListener('click',()=>{ hideLauncher(); AppRegistry.launch(a.id); });
      grid.appendChild(d);
    });
  }

  function showLauncher()  { lnch.classList.remove('hidden'); menuBtn.classList.add('active'); input.focus(); render(); }
  function hideLauncher()  { lnch.classList.add('hidden');   menuBtn.classList.remove('active'); input.value=''; }
  function toggleLauncher(){ lnch.classList.contains('hidden')?showLauncher():hideLauncher(); }

  menuBtn.addEventListener('click', e=>{ e.stopPropagation(); toggleLauncher(); });
  input.addEventListener('input', ()=>render(input.value));
  input.addEventListener('keydown', e=>{ if(e.key==='Escape')hideLauncher(); });
  document.addEventListener('click', e=>{ if(!lnch.contains(e.target)&&e.target!==menuBtn) hideLauncher(); });
}

/* ── TERMINAL ─────────────────────────────────────────── */
AppRegistry.register({
  id:'terminal', name:'Terminal', icon:'🖥️',
  launch({path}={}) {
    const wrap = document.createElement('div');
    wrap.className='terminal';

    const out  = document.createElement('div');  out.className='term-output';
    const row  = document.createElement('div');  row.className='term-input-row';
    const prom = document.createElement('span'); prom.className='term-prompt';
    const inp  = document.createElement('input'); inp.className='term-input'; inp.type='text'; inp.autocomplete='off'; inp.spellcheck=false;
    row.append(prom,inp); wrap.append(out,row);

    let hist=[], hIdx=-1;

    function updatePrompt() { prom.textContent=`${OS_META.user}@${OS_META.hostname}:${VFS.getCwd()}$ `; }

    function print(text, cls='line-out') {
      text.split('\n').forEach(line=>{
        const d=document.createElement('div'); d.className=cls; d.textContent=line;
        out.appendChild(d);
      });
      out.scrollTop=out.scrollHeight;
    }

    function run(raw) {
      const trimmed=raw.trim(); if(!trimmed)return;
      hist.unshift(trimmed); hIdx=-1;
      // echo command
      const promptLine=document.createElement('div'); promptLine.className='line-sys';
      promptLine.textContent=prom.textContent+raw; out.appendChild(promptLine);

      const [cmd,...args] = trimmed.split(/\s+/);
      execCmd(cmd,args);
      updatePrompt();
      out.scrollTop=out.scrollHeight;
    }

    function execCmd(cmd,args) {
      switch(cmd) {
        case 'help': print(HELP_TEXT,'line-info'); break;
        case 'clear': out.innerHTML=''; break;
        case 'pwd': print(VFS.getCwd()); break;
        case 'echo': print(args.join(' ')); break;
        case 'whoami': print(OS_META.user); break;
        case 'hostname': print(OS_META.hostname); break;
        case 'date': print(new Date().toString()); break;
        case 'uname':
          if(args.includes('-a'))
            print(`TeaTreeOS ${OS_META.hostname} 6.1.0-teatree #1 SMP PREEMPT ${OS_META.name}/${OS_META.codename} x86_64 GNU/Linux`);
          else print('TeaTreeOS'); break;
        case 'ls': {
          const path = args.find(a=>!a.startsWith('-'));
          const flag = args.find(a=>a.startsWith('-'));
          const r = VFS.ls(path);
          if(r.error){print(r.error,'line-err');break;}
          if(flag&&flag.includes('l')) {
            r.files.forEach(f=>print(`${f.type==='dir'?'d':'‒'}rw-r--r-- 1 ${OS_META.user} ${OS_META.user} ${f.type==='dir'?'<dir>':'    '} ${f.name}`));
          } else {
            const names = r.files.map(f=>f.type==='dir'?f.name+'/':f.name);
            print(names.join('  ')||'(empty)');
          }
          break;
        }
        case 'cd': {
          const r=VFS.cd(args[0]); if(r.error)print(r.error,'line-err'); break;
        }
        case 'cat': {
          if(!args[0]){print('cat: missing file operand','line-err');break;}
          const r=VFS.cat(args[0]); if(r.error)print(r.error,'line-err'); else print(r.content); break;
        }
        case 'mkdir': {
          if(!args[0]){print('mkdir: missing operand','line-err');break;}
          const r=VFS.mkdir(args[0]); if(r.error)print(r.error,'line-err'); break;
        }
        case 'touch': {
          if(!args[0]){print('touch: missing file operand','line-err');break;}
          const r=VFS.touch(args[0]); if(r.error)print(r.error,'line-err'); break;
        }
        case 'rm': {
          if(!args.length){print('rm: missing operand','line-err');break;}
          const recursive=args.some(a=>a==='-r'||a==='-rf'||a==='-fr');
          const targets=args.filter(a=>!a.startsWith('-'));
          targets.forEach(t=>{ const r=VFS.rm(t,recursive); if(r.error)print(r.error,'line-err'); });
          break;
        }
        case 'nano': case 'vi': case 'vim':
          AppRegistry.launch('editor', {file: args[0]||'untitled.txt'});
          print(`[Launching editor: ${args[0]||'untitled.txt'}]`,'line-info');
          break;
        case 'neofetch': printNeofetch(); break;
        case 'uptime': print(`up ${Math.floor(performance.now()/60000)} minutes, 1 user, load average: 0.12, 0.08, 0.04`); break;
        case 'ps': print('  PID TTY          TIME CMD\n  1   pts/0    00:00:00 bash\n  42  pts/0    00:00:00 teatree-wm\n  '+process.pid+' pts/0    00:00:00 terminal','line-out'); break;
        case 'env': print(`HOME=/home/${OS_META.user}\nUSER=${OS_META.user}\nSHELL=/bin/bash\nTERM=xterm-256color\nOS=${OS_META.name}`); break;
        case 'history': hist.forEach((c,i)=>print(`${String(hist.length-i).padStart(4)} ${c}`,'line-out')); break;
        case 'man': print(args[0]?`No manual entry for ${args[0]} in this demo. Try: help`:'What manual page do you want?','line-err'); break;
        case 'exit': case 'quit': Notify.send('Terminal','Session ended.'); break;
        case '': break;
        default: print(`${cmd}: command not found. Type 'help' for available commands.`,'line-err');
